<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>实验脑图 v12</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f8fa;--panel-bg:#fff;--border:#e4e7ed;--text:#303133;--text-secondary:#909399;--accent:#409eff;--accent-light:#ecf5ff;--hover-bg:#f5f7fa;--line:#dcdfe6;--shadow:0 1px 4px rgba(0,0,0,.08);--radius:6px}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;font-size:15px;color:var(--text);background:var(--bg)}
body{display:flex;flex-direction:column;overflow:hidden}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--panel-bg);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;min-height:48px}
.toolbar button{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel-bg);color:var(--text);font-size:14px;cursor:pointer;white-space:nowrap;transition:all .15s}
.toolbar button:hover{background:var(--hover-bg);border-color:var(--accent);color:var(--accent)}
.toolbar button:disabled{opacity:.5;cursor:not-allowed}
.toolbar button:disabled:hover{background:var(--panel-bg);border-color:var(--border);color:var(--text)}
.toolbar .title-input{flex:1;min-width:120px;max-width:320px;padding:4px 10px;border:1px solid transparent;border-radius:4px;font-size:16px;font-weight:600;background:transparent;color:var(--text);outline:none}
.toolbar .title-input:hover{border-color:var(--border);background:var(--hover-bg)}
.toolbar .title-input:focus{border-color:var(--accent);background:#fff}
.toolbar .width-group{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary)}
.toolbar .width-group input{width:56px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center;outline:none}
.toolbar .width-group input:focus{border-color:var(--accent)}
.toolbar .width-group .w-label{font-size:12px;white-space:nowrap}
.toolbar .zoom-group{display:inline-flex;align-items:center;gap:2px;font-size:13px}
.toolbar .zoom-group button{padding:6px 8px;min-width:auto}
.toolbar #zoom-label{min-width:42px;text-align:center;color:var(--text-secondary);font-size:13px}

/* Main layout */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* Mind map area - horizontal tree */
.mindmap-area{flex:1;overflow:auto;padding:20px;min-width:300px;background:var(--bg)}

/* Tree container - positions nodes absolutely */
.zoom-stage{transform-origin:0 0}
#mindmap-tree{position:relative;user-select:none;min-width:100%;min-height:100%;overflow:visible}

/* Node - absolute positioned, colored rounded rectangle */
#mindmap-tree .node{
  position:absolute;
  display:flex;
  align-items:center;
  gap:3px;
  padding:6px 8px;
  border-radius:8px;
  cursor:pointer;
  transition:box-shadow .15s,background .15s;
  border:1.5px solid;
  min-height:36px;
}
#mindmap-tree .node:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
#mindmap-tree .node.selected{
  box-shadow:0 0 0 2.5px #409eff;
  border-color:#409eff !important;
}
/* Fold button - right side circle */
#mindmap-tree .node .fold-btn{
  position:absolute;right:-11px;top:50%;transform:translateY(-50%);
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;cursor:pointer;z-index:3;
  background:#e0e0e0;color:#555;border:1px solid #bbb;
  line-height:1;user-select:none;box-shadow:0 1px 3px rgba(0,0,0,.15);
  transition:opacity .12s,background .12s;
}
#mindmap-tree .node .fold-btn:hover{background:#ccc;color:#333;border-color:#999}
#mindmap-tree .node .fold-btn.count{font-size:11px;display:flex}
#mindmap-tree .node .fold-btn.minus{display:flex;font-size:14px;font-weight:700}
#mindmap-tree .node .label{
  font-size:15px;line-height:1.3;padding:0 2px;
  flex:1;min-width:0;
  white-space:normal;word-break:normal;overflow-wrap:break-word;
}
/* 中心主题：大字号、居中 */
#mindmap-tree .node[data-depth="0"]{min-height:48px}
#mindmap-tree .node[data-depth="0"] .label{font-size:22px;text-align:center}
#mindmap-tree .node .badge{
  font-size:11px;
  padding:1px 5px;border-radius:10px;
  flex-shrink:0;display:none;
  background:rgba(0,0,0,.06);margin-top:2px;
}
#mindmap-tree .node .badge.has{display:inline}
/* Side note */
#mindmap-tree .side-note{
  position:absolute;font-size:13px;padding:4px 7px;background:#fff8e1;
  border:1px dashed #d4b84c;border-radius:4px;cursor:text;word-break:break-all;
  line-height:1.4;min-height:24px;transition:box-shadow .1s;
  z-index:1;
}
#mindmap-tree .side-note:hover{box-shadow:0 0 0 1px #d4b84c}
#mindmap-tree .side-note.editing{background:#fff;border-color:var(--accent);border-style:solid;box-shadow:0 0 0 2px var(--accent-light)}
#mindmap-tree .side-note .sn-del{
  position:absolute;right:-6px;top:-6px;width:16px;height:16px;border-radius:50%;
  background:#f56c6c;color:#fff;font-size:10px;line-height:16px;text-align:center;
  cursor:pointer;display:none;z-index:2;font-weight:700;
}
#mindmap-tree .side-note:hover .sn-del{display:block}

/* Marquee selection overlay */
#marquee-overlay{position:fixed;border:1.5px solid #409eff;background:rgba(64,158,255,.12);pointer-events:none;z-index:999;border-radius:2px;display:none}

/* SVG overlay */
#mindmap-tree svg{position:absolute;top:0;left:0;pointer-events:none;z-index:0}
#mindmap-tree .node{z-index:1}
#mindmap-tree .node.selected{z-index:10}

/* Panel resizer */
.panel-resizer{width:5px;cursor:col-resize;background:var(--border);flex-shrink:0;z-index:10;transition:background .15s}
.panel-resizer:hover,.panel-resizer.active{background:var(--accent)}
.panel-resizer.collapsed{display:none}

/* Attachment panel */
.attach-panel{width:320px;min-width:200px;background:var(--panel-bg);border-left:none;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;position:relative}
.attach-panel.collapsed{width:0;min-width:0;border-left:none;overflow:hidden}
.attach-panel .panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.attach-panel .panel-header .p-title{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.attach-panel .panel-header .p-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:4px;cursor:pointer;font-size:18px;color:var(--text-secondary);flex-shrink:0}
.attach-panel .panel-header .p-close:hover{background:var(--hover-bg)}
.attach-panel .panel-actions{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.attach-panel .panel-actions button{display:flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel-bg);cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;flex:1;justify-content:center;min-width:60px}
.attach-panel .panel-actions button:hover{background:var(--hover-bg);border-color:var(--accent);color:var(--accent)}
.attach-panel .panel-list{flex:1;overflow-y:auto;padding:12px 16px}
.attach-panel .empty-hint{text-align:center;color:var(--text-secondary);padding:40px 0;font-size:14px}

/* Attachment card */
.attach-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;margin-bottom:4px;position:relative}
.attach-card .card-header{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:2px}
.attach-card .card-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.attach-card .card-size{font-size:11px;color:var(--text-secondary);white-space:nowrap}
.attach-card .card-actions{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.attach-card .card-actions button{display:inline-flex;align-items:center;gap:1px;padding:1px 6px;border:1px solid var(--border);border-radius:3px;background:var(--panel-bg);cursor:pointer;font-size:11px;color:var(--text-secondary);transition:all .1s}
.attach-card .card-actions button:hover{background:var(--hover-bg);color:var(--text)}
.attach-card .card-actions .btn-del:hover{color:#f56c6c;border-color:#f56c6c}
.attach-card .note-preview{font-size:12px;color:var(--text);margin-top:2px;white-space:pre-wrap;word-break:break-word;max-height:150px;overflow:hidden;transition:max-height .25s;position:relative}
.attach-card .note-preview.expanded{max-height:none;overflow:visible}
.attach-card .note-preview.collapsible:after{content:'';position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(transparent,var(--bg));pointer-events:none}
.attach-card .note-preview.collapsible.expanded:after{display:none}
.attach-card .note-preview img{max-width:100%;border-radius:4px;cursor:pointer;display:block;margin:2px 0;max-height:50vh}
.attach-card .note-toggle{display:inline-block;font-size:11px;color:var(--accent);cursor:pointer;margin-top:1px;user-select:none}
.attach-card .note-toggle:hover{text-decoration:underline}
.attach-card .comment-preview{font-size:11px;color:var(--accent);margin-top:2px;padding:2px 6px;background:var(--accent-light);border-radius:3px;white-space:normal;word-break:break-word;cursor:pointer}
.attach-card .comment-preview img{max-width:100%;max-height:120px;border-radius:4px;vertical-align:middle;margin:2px 0;display:block;cursor:pointer}
.attach-card .comment-preview:hover{filter:brightness(.96)}
.attach-card .comment-edit{display:none;margin-top:3px}
.attach-card .comment-edit .cmt-editor{width:100%;padding:4px 6px;border:1px solid var(--accent);border-radius:3px;font-size:12px;font-family:inherit;outline:none;box-sizing:border-box;min-height:40px;max-height:160px;overflow-y:auto;background:#fff;word-break:break-word;white-space:pre-wrap}
.attach-card .comment-edit .cmt-editor img{max-width:100%;height:auto;border-radius:3px;margin:2px 0}
.attach-card .comment-edit .cmt-editor:empty:before{content:attr(placeholder);color:#c0c4cc}
.attach-card .comment-edit .comment-btns{display:flex;gap:4px;justify-content:flex-end;margin-top:3px}
.attach-card .comment-edit .comment-btns button{padding:1px 8px;border:1px solid var(--border);border-radius:3px;background:var(--panel-bg);cursor:pointer;font-size:11px}
.attach-card .comment-edit .comment-btns .cmt-save{border-color:var(--accent);background:var(--accent);color:#fff}
.attach-card .img-thumb{max-width:100%;max-height:200px;border-radius:3px;margin-top:2px;cursor:pointer;display:block}

/* Context menu */
.context-menu{position:fixed;background:var(--panel-bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);padding:4px 0;z-index:1000;min-width:150px;display:none}
.context-menu .cm-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:14px;transition:background .1s}
.context-menu .cm-item:hover{background:var(--hover-bg)}
.context-menu .cm-divider{height:1px;background:var(--border);margin:4px 0}

/* Export format menu */
.export-menu{position:absolute;top:100%;left:0;background:var(--panel-bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);padding:4px 0;z-index:1000;min-width:150px;display:none;margin-top:2px}
.export-menu .em-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:14px;transition:background .1s;white-space:nowrap}
.export-menu .em-item:hover{background:var(--hover-bg)}
.export-menu .em-divider{height:1px;background:var(--border);margin:4px 0}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-content{background:var(--panel-bg);border-radius:8px;max-width:90vw;max-height:90vh;overflow:hidden;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-content .modal-img-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:grab;position:relative;min-height:200px;min-width:200px}
.modal-content .modal-img-wrap:active{cursor:grabbing}
.modal-content .modal-img-wrap img{display:block;max-width:90vw;max-height:85vh;transform-origin:0 0;user-select:none;-webkit-user-drag:none;pointer-events:none}
.modal-content .modal-close{position:absolute;top:8px;right:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:rgba(0,0,0,.4);border-radius:50%;cursor:pointer;font-size:20px;color:#fff;z-index:1}
.modal-content .modal-close:hover{background:rgba(0,0,0,.6)}

/* Theme cards */
.theme-card{transition:all .15s}
.theme-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.theme-card.active{box-shadow:0 0 0 2px var(--accent)!important}

/* Panel toggle (when collapsed) */
.panel-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:100;width:28px;height:48px;display:none;align-items:center;justify-content:center;background:var(--panel-bg);border:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;cursor:pointer;font-size:14px;color:var(--text-secondary);box-shadow:var(--shadow)}
.panel-toggle:hover{color:var(--accent)}
.panel-toggle.show{display:flex}

/* Drag over */
#mindmap-tree .node.drag-over{box-shadow:0 0 0 2.5px var(--accent);background:var(--accent-light)!important}

/* Cross-link mode */
.toolbar #btn-link.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.node.link-source{box-shadow:0 0 0 3px #e9891e;animation:link-pulse .8s ease-in-out infinite alternate}
@keyframes link-pulse{from{box-shadow:0 0 0 3px #e9891e}to{box-shadow:0 0 0 6px #e9891e55}}
.node.link-target-hint:hover{box-shadow:0 0 0 3px #e9891e99;cursor:crosshair}
.cross-link-path{cursor:pointer;transition:stroke-width .1s}
.cross-link-path:hover{stroke-width:3.5!important;filter:brightness(.9)}
.cross-link-path.selected-link{stroke:#f56c6c!important;stroke-width:3.5!important}
.cross-link-handle{cursor:ns-resize;fill:#e9891e;stroke:#fff;stroke-width:2;transition:r .1s}
.cross-link-handle:hover{fill:#f56c6c;r:6}
.summary-brace{pointer-events:stroke;cursor:pointer}
.summary-brace:hover{stroke-width:2.5!important}
.summary-node{position:absolute;display:flex;align-items:center;justify-content:center;padding:6px 14px;border-radius:999px;background:#409eff;color:#fff;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.15);border:1.5px solid #2c7bd6;transition:box-shadow .15s}
.summary-node:hover{box-shadow:0 4px 12px rgba(0,0,0,.2)}
.summary-node.selected{box-shadow:0 0 0 3px #409eff88}
.summary-node.editing{white-space:pre-wrap;cursor:text;min-width:60px;outline:2px solid #409eff;outline-offset:2px}

/* Format toolbar */
.fmt-toolbar{display:none;position:fixed;z-index:200;background:#fff;border:1px solid #dcdfe6;border-radius:6px;padding:3px 5px;box-shadow:0 2px 12px rgba(0,0,0,.12);white-space:nowrap;align-items:center;gap:2px;user-select:none}
.fmt-toolbar.show{display:inline-flex}
.fmt-toolbar button{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border:1px solid transparent;border-radius:4px;background:transparent;cursor:pointer;font-size:13px;color:#606266;font-family:inherit;transition:all .1s}
.fmt-toolbar button:hover{background:#ecf5ff;color:var(--accent)}
.fmt-toolbar button.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.fmt-toolbar .fmt-sep{width:1px;height:18px;background:#e4e7ed;margin:0 3px}
.fmt-toolbar .fmt-size{padding:2px 4px;border:1px solid #dcdfe6;border-radius:4px;font-size:12px;color:#606266;outline:none;cursor:pointer;background:#fff}
.fmt-toolbar .fmt-color{width:26px;height:26px;padding:2px;border:1px solid #dcdfe6;border-radius:4px;cursor:pointer;background:#fff}
.note-fmt-toolbar{display:flex;align-items:center;gap:2px;padding:2px 4px;margin-bottom:2px;background:#f5f7fa;border-radius:4px;white-space:nowrap}
.note-fmt-toolbar button{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1px solid transparent;border-radius:3px;background:transparent;cursor:pointer;font-size:11px;color:#909399;font-family:inherit;transition:all .1s}
.note-fmt-toolbar button:hover{background:#fff;color:#303133;border-color:#dcdfe6}
.note-fmt-toolbar .note-fmt-sep{width:1px;height:14px;background:#dcdfe6;margin:0 2px}
.note-fmt-toolbar select{padding:1px 2px;border:1px solid #dcdfe6;border-radius:3px;font-size:11px;color:#606266;outline:none;cursor:pointer;background:#fff}
.note-fmt-toolbar input[type=color]{width:22px;height:22px;padding:1px;border:1px solid #dcdfe6;border-radius:3px;cursor:pointer;background:#fff}

/* Panel drop zone */
.attach-panel.drop-active{outline:3px dashed var(--accent);outline-offset:-8px;background:var(--accent-light)}
.panel-drop-hint{display:none;position:absolute;inset:0;align-items:center;justify-content:center;z-index:50;pointer-events:none;font-size:16px;font-weight:500;color:var(--accent)}
.attach-panel.drop-active .panel-drop-hint{display:flex}
.attach-panel.drop-active .panel-actions,.attach-panel.drop-active .panel-list{opacity:.25}

/* Canvas panning */
#mindmap-area{cursor:default;touch-action:none;-webkit-touch-callout:none;user-select:none}
#mindmap-area.panning,#mindmap-area.panning .node,#mindmap-area.panning .node .fold-btn,#mindmap-area.panning .side-note,#mindmap-area.panning svg{cursor:grabbing!important}

/* Responsive */
@media(max-width:768px){
  .attach-panel{position:fixed;top:48px;right:0;bottom:0;z-index:500;box-shadow:-4px 0 16px rgba(0,0,0,.1)}
  .attach-panel.collapsed{transform:translateX(100%)}
  .toolbar{gap:4px;padding:6px 8px}
  .toolbar button{padding:4px 8px;font-size:13px}
  .toolbar .title-input{max-width:160px}
}
#inline-editor-text:empty:before{content:attr(data-placeholder);color:#c0c4cc;cursor:text}
#inline-editor-text img{max-width:100%;height:auto}
/* Formatting toolbar */
.format-bar{display:flex;flex-wrap:wrap;align-items:center;gap:2px;margin-bottom:4px;padding:4px 6px;background:var(--hover-bg);border-radius:4px;border:1px solid var(--border);position:relative}
.format-bar button{display:inline-flex;align-items:center;justify-content:center;width:28px;height:26px;border:none;background:transparent;border-radius:3px;cursor:pointer;font-size:13px;color:var(--text);transition:all .1s;padding:0}
.format-bar button:hover{background:var(--panel-bg);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.format-bar button.active{background:var(--accent-light);color:var(--accent)}
.format-bar .fmt-sep{width:1px;height:18px;background:var(--border);margin:0 3px}
.format-bar select{height:24px;padding:0 4px;border:1px solid var(--border);border-radius:3px;background:var(--panel-bg);color:var(--text);font-size:12px;cursor:pointer;outline:none}
.format-bar select:hover{border-color:var(--accent)}
.format-bar input[type=color]{width:22px;height:22px;padding:0;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:var(--panel-bg)}
.format-bar input[type=color]:hover{border-color:var(--accent)}
#fmt-color-grid .fs-swatch,
#node-color-grid .fs-swatch{width:100%;aspect-ratio:1;border-radius:3px;cursor:pointer;transition:transform .1s;border:1.5px solid transparent;box-sizing:border-box}
#fmt-color-grid .fs-swatch:hover,
#node-color-grid .fs-swatch:hover{transform:scale(1.2);z-index:1}
#fmt-color-grid .fs-swatch.selected,
#node-color-grid .fs-swatch.selected{outline:2px solid var(--accent);outline-offset:1px}

/* 浏览器存储弹窗 */
.local-dialog-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:999}
.local-dialog{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:1000;width:400px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column}
.local-dialog .ld-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.local-dialog .ld-close{width:28px;height:28px;border:none;background:transparent;font-size:20px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.local-dialog .ld-close:hover{background:var(--hover-bg)}
.local-dialog .ld-body{padding:16px 18px;overflow-y:auto;flex:1}
.local-dialog .ld-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.local-dialog .ld-footer button{padding:7px 16px;border-radius:6px;font-size:14px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text)}
.local-dialog .ld-footer button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.local-dialog .ld-footer button.primary:hover{opacity:.9}
.local-dialog .ld-footer button:hover{background:var(--hover-bg)}
.ld-save-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;box-sizing:border-box;margin-top:4px}
.ld-save-input:focus{border-color:var(--accent)}
.ld-item{display:flex;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:background .1s}
.ld-item:hover{background:var(--accent-light);border-color:var(--accent)}
.ld-item .ld-name{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ld-item .ld-time{font-size:12px;color:var(--text-secondary);margin-left:12px;white-space:nowrap}
.ld-item .ld-del{width:24px;height:24px;border:none;background:transparent;font-size:16px;cursor:pointer;border-radius:4px;color:#999;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px}
.ld-item .ld-del:hover{background:#fef0f0;color:#f56c6c}
.ld-empty{padding:30px 0;text-align:center;color:var(--text-secondary);font-size:14px}
.ld-tab{flex:1;padding:10px;border:none;background:transparent;font-size:14px;cursor:pointer;color:var(--text-secondary);transition:all .1s;border-bottom:2px solid transparent}
.ld-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.ld-tab:hover{color:var(--text);background:var(--hover-bg)}
.ld-status{padding:6px 0;text-align:center;color:var(--text-secondary);font-size:13px}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <button id="btn-new" title="新建脑图">📂 新建</button>
  <button id="btn-save" title="保存为 .qmind 文件 (Ctrl+S)">💾 保存<span id="save-indicator" style="color:#e6a23c;font-weight:700"></span></button>
  <button id="btn-open" title="打开 .qmind 文件">📁 打开</button>
  <button id="btn-save-local" title="保存到浏览器">📥 存本地</button>
  <button id="btn-load-local" title="从浏览器打开">📂 取本地</button>
  <button id="btn-save-cloud" title="保存到GitHub云端">☁️ 存云端</button>
  <button id="btn-load-cloud" title="从云端打开">☁️ 取云端</button>
  <button id="btn-cloud-token" title="设置GitHub令牌">🔑 令牌</button>
  <span style="position:relative">
    <button id="btn-export" title="导出脑图">📷 导出 ▾</button>
    <div class="export-menu" id="export-menu">
      <div class="em-item" data-format="png">🖼️ PNG 图片</div>
      <div class="em-item" data-format="jpeg">🖼️ JPEG 图片</div>
      <div class="em-divider"></div>
      <div class="em-item" data-format="pdf">📄 PDF 文档</div>
    </div>
  </span>
  <!-- 内联编辑 div(contenteditable) - 比 textarea 更友好于中文IME -->
  <div id="inline-label-input" contenteditable="true"
    style="display:none;position:fixed;background:transparent;border:none;outline:none;overflow:hidden;padding:6px 8px;margin:0;font-size:15px;font-family:inherit;line-height:1.3;white-space:pre-wrap;word-wrap:break-word;word-break:break-word;color:inherit;z-index:100;border-radius:8px;min-height:24px"
    spellcheck="false"></div>
  <!-- 格式化工具栏 -->
  <div id="fmt-toolbar" class="fmt-toolbar">
    <button data-cmd="bold" title="加粗 (Ctrl+B)"><b>B</b></button>
    <button data-cmd="italic" title="斜体 (Ctrl+I)"><i>I</i></button>
    <button data-cmd="underline" title="下划线 (Ctrl+U)"><u>U</u></button>
    <span class="fmt-sep"></span>
    <select class="fmt-size" title="字号">
      <option value="">字号</option>
      <option value="1">12</option><option value="2">14</option><option value="3">16</option>
      <option value="4">18</option><option value="5">24</option><option value="6">28</option>
      <option value="7">36</option>
    </select>
    <button title="文字颜色" id="node-color-btn" style="width:26px;height:26px;border:1px solid #dcdfe6;border-radius:4px;background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;font-size:13px;color:#606266"><span style="border-bottom:3px solid #303133;line-height:1">A</span></button>
  </div>
  <div id="node-color-popup" style="display:none;position:fixed;z-index:210;background:#fff;border:1px solid #dcdfe6;border-radius:8px;padding:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);width:220px">
    <div id="node-color-grid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-bottom:8px"></div>
    <div style="display:flex;gap:6px;justify-content:flex-end">
      <button id="node-color-cancel" style="padding:2px 8px;border:1px solid #dcdfe6;border-radius:4px;background:#fff;cursor:pointer;font-size:11px;color:#606266">取消</button>
      <button id="node-color-apply" style="padding:2px 8px;border:1px solid var(--accent);border-radius:4px;background:var(--accent);color:#fff;cursor:pointer;font-size:11px">应用</button>
    </div>
  </div>
  <button id="btn-undo" title="撤回 (Ctrl+Z)" disabled>↩ 撤回</button>
  <button id="btn-redo" title="重做 (Ctrl+Shift+Z)" disabled>↪ 重做</button>
  <button id="btn-theme" title="配色方案">🎨 配色</button>
  <span class="width-group">
    <span class="w-label">宽度</span>
    <input type="number" id="width-input" value="210" min="100" max="500" step="1" title="节点宽度(px)">
    <span class="w-label">px</span>
  </span>
  <button id="btn-width-all" title="应用到全部节点">全宽</button>
  <button id="btn-width-selected" title="应用到选中节点" disabled>选宽</button>
  <button id="btn-link" title="连接模式：点击两个节点创建关联线">🔗 连线</button>
  <button id="btn-summary" title="选中多个节点后点击添加概要">⎇ 概要</button>
  <span class="zoom-group">
    <button id="btn-zoom-out" title="缩小 (Ctrl+滚轮)">🔍−</button>
    <span id="zoom-label">100%</span>
    <button id="btn-zoom-in" title="放大 (Ctrl+滚轮)">🔍+</button>
  </span>
  <input type="file" id="file-open" accept=".qmind" style="display:none">
  <input type="text" id="title-input" class="title-input" value="实验脑图" placeholder="脑图标题">
</div>

<!-- Main -->
<div class="main">
  <div class="mindmap-area" id="mindmap-area">
    <div id="init-error" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 30px;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;color:#856404;font-size:14px;z-index:200;text-align:center;max-width:90%"></div>
    <div class="zoom-stage" id="zoom-stage">
      <div id="mindmap-tree"></div>
    </div>
    <div id="marquee-overlay"></div>
  </div>
  <div class="panel-resizer" id="panel-resizer"></div>
  <div class="attach-panel" id="attach-panel">
    <div class="panel-drop-hint" id="panel-drop-hint">📂 拖放文件或 Ctrl+V 粘贴图片</div>
    <div class="panel-header">
      <span class="p-title" id="panel-title">选择节点查看附件</span>
      <button class="p-close" id="panel-close" title="折叠面板">▶</button>
    </div>
    <div class="panel-actions" id="panel-actions">
      <button id="btn-add-note">📝 笔记</button>
      <button id="btn-add-image">🖼️ 图片</button>
      <button id="btn-add-file">📎 文件</button>
      <input type="file" id="file-image-input" accept="image/*" style="display:none" multiple>
      <input type="file" id="file-file-input" style="display:none" multiple>
    </div>
    <!-- Inline note editor (in side panel) -->
    <div class="inline-editor" id="inline-editor" style="display:none;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div style="font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text)" id="inline-editor-title">编辑笔记</div>
      <div class="format-bar" id="format-bar">
        <button title="撤销 (Ctrl+Z)" data-cmd="undo">↩</button>
        <button title="重做 (Ctrl+Shift+Z)" data-cmd="redo">↪</button>
        <span class="fmt-sep"></span>
        <button title="粗体 (Ctrl+B)" data-cmd="bold"><b>B</b></button>
        <button title="斜体 (Ctrl+I)" data-cmd="italic"><i>I</i></button>
        <button title="下划线 (Ctrl+U)" data-cmd="underline"><u>U</u></button>
        <button title="删除线" data-cmd="strikeThrough"><s>S</s></button>
        <span class="fmt-sep"></span>
        <button id="fmt-size-dec" title="减小字号" style="width:28px;height:26px;font-weight:700;font-size:12px">A−</button>
        <select id="fmt-fontsize" title="字号">
          <option value="">字号</option><option value="10">10</option><option value="12">12</option><option value="14">14</option>
          <option value="16">16</option><option value="18">18</option><option value="20">20</option><option value="24">24</option>
          <option value="28">28</option><option value="32">32</option><option value="36">36</option><option value="48">48</option><option value="72">72</option>
        </select>
        <button id="fmt-size-inc" title="增大字号" style="width:28px;height:26px;font-weight:700;font-size:12px">A+</button>
        <span class="fmt-sep"></span>
        <button title="无序列表" data-cmd="insertUnorderedList">☰</button>
        <button title="有序列表" data-cmd="insertOrderedList">#</button>
        <span class="fmt-sep"></span>
        <button title="减少缩进" data-cmd="outdent">⇤</button>
        <button title="增加缩进" data-cmd="indent">⇥</button>
        <span class="fmt-sep"></span>
        <button title="文字颜色" id="fmt-text-color-btn" style="width:28px;height:26px;border:1px solid var(--border);border-radius:3px;cursor:pointer;padding:0;background:var(--panel-bg);display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:var(--text);position:relative"><span style="border-bottom:3px solid #333;line-height:1">A</span></button>
        <button title="背景颜色" id="fmt-bg-color-btn" style="width:28px;height:26px;border:1px solid var(--border);border-radius:3px;cursor:pointer;padding:0;background:var(--panel-bg);display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:var(--text);position:relative"><span style="display:inline-block;width:16px;height:16px;border:1px solid #999;border-radius:2px;background:#ffff00"></span></button>
      </div>
      <div id="fmt-color-popup" style="display:none;position:fixed;z-index:500;background:var(--panel-bg);border:1px solid var(--border);border-radius:8px;padding:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);margin-top:2px;width:236px">
        <div id="fmt-color-grid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-bottom:10px"></div>
        <div style="display:flex;gap:6px;justify-content:flex-end">
          <button id="fmt-color-cancel" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:var(--panel-bg);cursor:pointer;font-size:12px;color:var(--text)">取消</button>
          <button id="fmt-color-apply" style="padding:3px 10px;border:1px solid var(--accent);border-radius:4px;background:var(--accent);color:#fff;cursor:pointer;font-size:12px">应用</button>
        </div>
      </div>
      <div id="inline-editor-text" contenteditable="true" style="width:100%;min-height:80px;max-height:calc(100vh - 290px);padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box;overflow:auto;white-space:pre-wrap;word-break:break-word" data-placeholder="输入笔记内容..."></div>
      <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:6px">
        <button id="inline-editor-cancel" style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:var(--panel-bg);cursor:pointer;font-size:12px;color:var(--text)">取消</button>
        <button id="inline-editor-save" style="padding:4px 12px;border:1px solid var(--accent);border-radius:4px;background:var(--accent);color:#fff;cursor:pointer;font-size:12px">保存</button>
      </div>
    </div>
    <div class="panel-list" id="panel-list">
      <div class="empty-hint">选择节点后查看附件</div>
    </div>
  </div>
</div>

<!-- Panel toggle -->
<button class="panel-toggle" id="panel-toggle" title="打开附件面板">◀</button>

<!-- Context menu -->
<div class="context-menu" id="context-menu">
  <div class="cm-item" data-action="add-child">➕ 添加子节点</div>
  <div class="cm-item" data-action="add-sibling">➕ 添加同级节点</div>
  <div class="cm-divider"></div>
  <div class="cm-item" data-action="rename">✏️ 重命名</div>
  <div class="cm-item" data-action="color">🎨 设置颜色</div>
  <div class="cm-item" data-action="set-width">📏 设置宽度</div>
  <div class="cm-item" data-action="set-fontsize">🔤 设置字号</div>
  <div class="cm-item" data-action="text-align">⬌ 文本对齐</div>
  <div class="cm-item" data-action="add-sidenote">📝 添加旁注</div>
  <div class="cm-divider"></div>
  <div class="cm-item" data-action="delete">🗑️ 删除节点</div>
</div>

<!-- Image preview modal -->
<div class="modal-overlay" id="img-modal">
  <div class="modal-content">
    <button class="modal-close" id="img-modal-close">✕</button>
    <div class="modal-img-wrap" id="modal-img-wrap"><img id="img-modal-img" src="" alt="preview"></div>
  </div>
</div>

<!-- Color picker modal -->
<div class="modal-overlay" id="color-modal">
  <div class="modal-inner" style="background:var(--panel-bg);border-radius:8px;padding:20px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
    <h3 style="font-size:16px;margin-bottom:16px">设置节点颜色</h3>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button id="color-target-fill" class="color-target-btn active" data-target="fill" style="flex:1;padding:6px;border:2px solid var(--accent);border-radius:6px;background:var(--accent-light);color:var(--accent);font-size:14px;cursor:pointer;font-weight:600">填充颜色</button>
      <button id="color-target-text" class="color-target-btn" data-target="text" style="flex:1;padding:6px;border:2px solid var(--border);border-radius:6px;background:var(--panel-bg);color:var(--text);font-size:14px;cursor:pointer">文字颜色</button>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:14px;align-items:center">
      <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary)">填充 <span id="color-fill-preview" style="display:inline-block;width:28px;height:28px;border-radius:4px;border:1.5px solid var(--border);vertical-align:middle"></span></div>
      <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary)">文字 <span id="color-text-preview" style="display:inline-block;width:28px;height:28px;border-radius:4px;border:1.5px solid var(--border);vertical-align:middle"></span></div>
    </div>
    <div id="color-palette-grid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:16px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;align-items:center">
      <button id="color-clear" style="padding:6px 12px;border:1px solid #f56c6c;border-radius:4px;background:#fff;color:#f56c6c;cursor:pointer;font-size:13px;margin-right:auto">清除自定义颜色</button>
      <button id="color-cancel" style="padding:6px 16px;border:1px solid var(--border);border-radius:4px;background:var(--panel-bg);cursor:pointer;font-size:14px">取消</button>
      <button id="color-apply" style="padding:6px 16px;border:1px solid var(--accent);border-radius:4px;background:var(--accent);color:#fff;cursor:pointer;font-size:14px">应用</button>
    </div>
  </div>
</div>

<!-- Font size picker modal -->
<div class="modal-overlay" id="fontsize-modal">
  <div class="modal-inner" style="background:var(--panel-bg);border-radius:8px;padding:20px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
    <h3 style="font-size:16px;margin-bottom:16px">设置字号 (px)</h3>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px" id="fontsize-grid"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="fontsize-cancel" style="padding:6px 16px;border:1px solid var(--border);border-radius:4px;background:var(--panel-bg);cursor:pointer;font-size:14px">取消</button>
      <button id="fontsize-clear" style="padding:6px 16px;border:1px solid #f56c6c;border-radius:4px;background:#fff;color:#f56c6c;cursor:pointer;font-size:13px">恢复默认</button>
    </div>
  </div>
</div>

<!-- Text align modal -->
<div class="modal-overlay" id="textalign-modal">
  <div class="modal-inner" style="background:var(--panel-bg);border-radius:8px;padding:20px;width:280px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
    <h3 style="font-size:16px;margin-bottom:16px">文本对齐</h3>
    <div style="display:flex;gap:10px;margin-bottom:16px" id="textalign-grid">
      <button class="tal-opt" data-align="left" style="flex:1;padding:10px 8px;border:2px solid var(--border);border-radius:6px;background:var(--panel-bg);cursor:pointer;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .1s">
        <span style="font-size:18px">⬅</span><span>左对齐</span>
      </button>
      <button class="tal-opt" data-align="center" style="flex:1;padding:10px 8px;border:2px solid var(--border);border-radius:6px;background:var(--panel-bg);cursor:pointer;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .1s">
        <span style="font-size:18px">⬌</span><span>居中</span>
      </button>
      <button class="tal-opt" data-align="right" style="flex:1;padding:10px 8px;border:2px solid var(--border);border-radius:6px;background:var(--panel-bg);cursor:pointer;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .1s">
        <span style="font-size:18px">➡</span><span>右对齐</span>
      </button>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="tal-cancel" style="padding:6px 16px;border:1px solid var(--border);border-radius:4px;background:var(--panel-bg);cursor:pointer;font-size:14px">取消</button>
      <button id="tal-clear" style="padding:6px 16px;border:1px solid #f56c6c;border-radius:4px;background:#fff;color:#f56c6c;cursor:pointer;font-size:13px">恢复默认</button>
    </div>
  </div>
</div>

<!-- Theme picker modal -->
<div class="modal-overlay" id="theme-modal">
  <div class="modal-inner" style="background:var(--panel-bg);border-radius:8px;padding:24px;width:600px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.2)">
    <h3 style="font-size:18px;margin-bottom:16px">选择配色方案</h3>
    <div id="theme-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="theme-close" style="padding:6px 16px;border:1px solid var(--border);border-radius:4px;background:var(--panel-bg);cursor:pointer;font-size:14px">关闭</button>
    </div>
  </div>
</div>

<!-- 浏览器存储弹窗 -->
<div class="local-dialog-overlay" id="local-dialog-overlay">
  <div class="local-dialog" id="local-dialog-save" style="display:none">
    <div class="ld-header">
      <span id="ld-save-title">保存到浏览器</span>
      <button class="ld-close" id="ld-save-close">×</button>
    </div>
    <div class="ld-body">
      <label style="font-size:14px;color:var(--text-secondary)">脑图名称</label>
      <input class="ld-save-input" id="ld-save-name" placeholder="输入名称..." maxlength="50">
    </div>
    <div class="ld-footer">
      <button id="ld-save-cancel">取消</button>
      <button class="primary" id="ld-save-confirm">保存</button>
    </div>
  </div>
  <div class="local-dialog" id="local-dialog-load" style="display:none">
    <div class="ld-header">
      <span>打开脑图</span>
      <button class="ld-close" id="ld-load-close">×</button>
    </div>
    <div style="display:flex;border-bottom:1px solid var(--border)">
      <button class="ld-tab active" data-tab="local">📥 本地</button>
      <button class="ld-tab" data-tab="cloud">☁️ 云端</button>
    </div>
    <div class="ld-body" id="ld-load-list">
      <div class="ld-empty">暂无保存的脑图</div>
    </div>
    <div class="ld-footer" id="ld-load-error" style="display:none;color:#f56c6c;font-size:13px;justify-content:flex-start;padding:6px 18px"></div>
    <div class="ld-footer">
      <button id="ld-load-cancel">关闭</button>
      <button id="ld-refresh-cloud" style="display:none">🔄 刷新</button>
    </div>
  </div>
</div>

<script>
/* ==================== ERROR HANDLING ==================== */
window._mindmapInitError = null;
window.onerror = function(msg, url, line, col, err){
  console.error('Mindmap error:', msg, 'at line', line);
  window._mindmapInitError = msg + ' (line ' + line + ')';
  var er = document.getElementById('init-error');
  if(er){ er.style.display='block'; er.textContent = '初始化失败: ' + window._mindmapInitError; }
  return true;

/* Calculate text width using a temporary canvas (for summary nodes) */
function calcTextWidth(text, fontSize){
  const fz = fontSize || 15;
  try {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    ctx.font = fz + 'px sans-serif';
    return Math.max(60, Math.round(ctx.measureText(text || '').width) + 28);
  } catch(e){
    return Math.max(60, (text || '').length * Math.round(fz * 0.65) + 24);
  }
}

/* Bezier curve helpers for cross-links */
function getBezierPoint(t, p0, p1, p2, p3){
  const u = 1 - t;
  const tt = t * t;
  const uu = u * u;
  const uuu = uu * u;
  const ttt = tt * t;
  return uuu * p0 + 3 * uu * t * p1 + 3 * u * tt * p2 + ttt * p3;
}

function sampleBezier(fx, fy, c1x, c1y, c2x, c2y, tx, ty, steps){
  const pts = [];
  for(let i = 0; i <= steps; i++){
    const t = i / steps;
    pts.push({
      x: getBezierPoint(t, fx, c1x, c2x, tx),
      y: getBezierPoint(t, fy, c1y, c2y, ty)
    });
  }
  return pts;
}

function pointInNodeRect(x, y, nx, ny, nw, nh, padding){
  const p = padding || 8;
  return x >= nx - p && x <= nx + nw + p && y >= ny - p && y <= ny + nh + p;
}

function computeCrossLinkPath(cl, fp, tp, allPositions){
  const fx = fp.x + fp.w;
  const fy = fp.y + fp.h / 2;
  const tx = tp.x;
  const ty = tp.y + tp.h / 2;
  const midX = (fx + tx) / 2;
  const baseDy = Math.abs(ty - fy) * 0.2 + 30;

  let offsetY = (cl.midOffsetY !== undefined) ? cl.midOffsetY : 0;

  // Auto collision avoidance if offset not manually set
  if(cl.midOffsetY === undefined && allPositions && allPositions.length > 0){
    const c1x = midX, c1y = fy - baseDy + offsetY;
    const c2x = midX, c2y = ty + baseDy + offsetY;
    const samples = sampleBezier(fx, fy, c1x, c1y, c2x, c2y, tx, ty, 20);
    let collides = false;
    for(const p of samples){
      for(const np of allPositions){
        if(np.node.id === cl.from || np.node.id === cl.to) continue;
        if(pointInNodeRect(p.x, p.y, np.x, np.y, np.w, np.h)){
          collides = true; break;
        }
      }
      if(collides) break;
    }
    if(collides){
      // Try upward offset
      let bestOffset = 0;
      for(const dir of [-1, 1]){
        for(let attempt = 1; attempt <= 10; attempt++){
          const testOffset = dir * attempt * 35;
          const tC1y = fy - baseDy + testOffset;
          const tC2y = ty + baseDy + testOffset;
          const tSamples = sampleBezier(fx, fy, midX, tC1y, midX, tC2y, tx, ty, 20);
          let hit = false;
          for(const sp of tSamples){
            for(const np of allPositions){
              if(np.node.id === cl.from || np.node.id === cl.to) continue;
              if(pointInNodeRect(sp.x, sp.y, np.x, np.y, np.w, np.h)){ hit = true; break; }
            }
            if(hit) break;
          }
          if(!hit){ bestOffset = testOffset; break; }
        }
        if(bestOffset !== 0) break;
      }
      offsetY = bestOffset;
      cl.midOffsetY = offsetY;
    }
  }

  const c1x = midX, c1y = fy - baseDy + offsetY;
  const c2x = midX, c2y = ty + baseDy + offsetY;
  // Compute handle position at t=0.5
  const hx = getBezierPoint(0.5, fx, c1x, c2x, tx);
  const hy = getBezierPoint(0.5, fy, c1y, c2y, ty);
  return {
    d: `M${fx} ${fy} C${c1x} ${c1y}, ${c2x} ${c2y}, ${tx} ${ty}`,
    hx, hy, c1x, c1y, c2x, c2y, fx, fy, tx, ty, midX, baseDy
  };
}

function findNode(id, node){
  if(node.id===id) return node;
  for(const c of node.children){const r=findNode(id,c);if(r)return r}
  // If searching from root, also check summary children
  if(node === (mindmap && mindmap.root)){
    if(mindmap.summaries){
      for(const sum of mindmap.summaries){
        if(sum.children){
          for(const c of sum.children){
            const r = findNode(id, c);
            if(r) return r;
          }
        }
      }
    }
  }
  return null;
}

function findParent(id, node){
  for(const c of node.children){if(c.id===id)return node;const r=findParent(id,c);if(r)return r}
  return null;
}

/* Find a node inside summary children trees (legacy, now integrated into findNode) */
function findNodeInSummaries(id){
  if(!mindmap || !mindmap.summaries) return null;
  for(const sum of mindmap.summaries){
    if(sum.children){
      for(const c of sum.children){
        const r = findNode(id, c);
        if(r) return r;
      }
    }
  }
  return null;
}

/* Find which summary owns a given node id (direct child or descendant) */
function findSummaryByChildId(id){
  if(!mindmap || !mindmap.summaries) return null;
  for(const sum of mindmap.summaries){
    if(sum.children){
      for(const c of sum.children){
        if(c.id === id) return sum;
        const r = findNode(id, c);
        if(r) return sum;
      }
    }
  }
  return null;
}

/* Find parent of a node inside summary children tree */
/* Returns { summary, parent } where parent is the immediate parent node (null if direct child of summary) */
function findParentInSummary(id){
  if(!mindmap || !mindmap.summaries) return null;
  for(const sum of mindmap.summaries){
    if(!sum.children) continue;
    for(const c of sum.children){
      if(c.id === id) return { summary: sum, parent: null };
      const r = findParent(id, c);
      if(r) return { summary: sum, parent: r };
    }
  }
  return null;
}

function countDesc(n){let c=0;for(const ch of n.children)c+=1+countDesc(ch);return c}
function countAtt(n){return n.attachments.length}

/* 递归清除所有节点的自定义颜色（替换配色时调用） */
function clearAllNodeColors(node){
  if(!node) return;
  node.fillColor = null;
  node.textColor = null;
  for(const c of node.children) clearAllNodeColors(c);
  // 概要子节点
  if(mindmap && mindmap.summaries){
    for(const sum of mindmap.summaries){
      if(sum.children) for(const c of sum.children) clearAllNodeColors(c);
    }
  }
}

function getTheme(){
  return themes[currentThemeName] || themes.default;
}

function getDefaultColor(node, depth, parentColor){
  const theme = getTheme();
  if(depth === 0) return theme.root;
  if(depth === 1){
    if(!depth1Colors[node.id]){
      depth1Colors[node.id] = theme.palette[0];
    }
    return depth1Colors[node.id];
  }
  const idx = Math.min(depth - 1, theme.palette.length - 1);
  return theme.palette[idx];
}

function getNodeColor(node, depth, parentColor){
  if(node.fillColor || node.textColor){
    const defaultColor = getDefaultColor(node, depth, parentColor);
    return {
      bg: node.fillColor || defaultColor.bg,
      border: node.fillColor ? darkenBorder(node.fillColor) : defaultColor.border,
      text: node.textColor || defaultColor.text
    };
  }
  return getDefaultColor(node, depth, parentColor);
}

function darkenBorder(hex, amt){
  if(!hex || hex === 'transparent') return '#ccc';
  const num = parseInt(hex.slice(1), 16);
  const r = Math.max(0, Math.round((num >> 16) * (1 - (amt||0.2))));
  const g = Math.max(0, Math.round(((num >> 8) & 0x00FF) * (1 - (amt||0.2))));
  const b = Math.max(0, Math.round((num & 0x0000FF) * (1 - (amt||0.2))));
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}

function lightenColor(hex, amt){
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (num >> 16) + Math.round((255 - (num >> 16)) * amt));
  const g = Math.min(255, ((num >> 8) & 0x00FF) + Math.round((255 - ((num >> 8) & 0x00FF)) * amt));
  const b = Math.min(255, (num & 0x0000FF) + Math.round((255 - (num & 0x0000FF)) * amt));
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}
