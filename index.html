/* ==================== TEXT HEIGHT CALC ==================== */
function calcTextHeight(label, width, fontSize){
  const fz = fontSize || 15;
  const availWidth = width - 20;
  const avgCharWidth = fz * 1.0;
  // Strip HTML tags to count only visible characters (prevents inflated height when label contains <span style="color:...">)
  const textOnly = label.replace(/<[^>]*>/g, '');
  const charsPerLine = Math.max(1, Math.floor(availWidth / avgCharWidth));
  const lines = Math.ceil((textOnly.length || 1) / charsPerLine);
  return Math.max(1, lines) * Math.round(fz * 1.35) + Math.round(fz * 1.5);
}

/* ==================== LAYOUT ALGORITHM ==================== */
let nodePositions = [];
let totalCanvasW = 0;
let totalCanvasH = 0;

function calcTreeHeight(node){
  const bw = countAtt(node) > 0 ? 35 : 0;
  const effectiveW = Math.max(100, getNodeWidth(node) - bw);
  const badgeH = calcTextHeight(node.label, effectiveW, node.fontSize);
  const snH = (node.sideNotes && node.sideNotes.length > 0) ? node.sideNotes.length * 30 + 8 : 0;
  if(!node.expanded || node.children.length === 0){
    node._nodeHeight = calcTextHeight(node.label, getNodeWidth(node), node.fontSize);
    node._treeHeight = Math.max(node._nodeHeight, badgeH) + snH;
    return node._treeHeight;
  }
  node._nodeHeight = Math.max(calcTextHeight(node.label, getNodeWidth(node), node.fontSize), badgeH);
  let total = 0;
  for(const c of node.children){
    c._treeHeight = calcTreeHeight(c);
    total += c._treeHeight + V_GAP;
  }
  total -= V_GAP;
  node._treeHeight = Math.max(node._nodeHeight, total) + snH;
  return node._treeHeight;
}

function assignPositions(node, depth, x, y, parentColor){
  const color = getNodeColor(node, depth, parentColor);
  const w = getNodeWidth(node);
  const h = node._nodeHeight || calcTextHeight(node.label, w, node.fontSize);
  nodePositions.push({ node, x, y, w, h, depth, color });

  if(node.expanded && node.children.length > 0){
    const childX = x + w + H_GAP;
    const parentCenter = y + h / 2;
    if(node.children.length === 1){
      assignPositions(node.children[0], depth + 1, childX, parentCenter - node.children[0]._nodeHeight / 2, color);
    } else {
      let total = 0;
      for(const c of node.children) total += c._treeHeight;
      total += (node.children.length - 1) * V_GAP;
      let childY = parentCenter - total / 2;
      for(const c of node.children){
        assignPositions(c, depth + 1, childX, childY, color);
        childY += c._treeHeight + V_GAP;
      }
    }
  }
}

function layoutWithCollisionAvoidance(){
  nodePositions = [];
  const treeHeight = mindmap.root._treeHeight;
  const area = document.getElementById('mindmap-area');
  const containerHeight = Math.max(area.clientHeight, 500);
  const rootY = Math.max(60, (containerHeight - treeHeight) / 2);
  assignPositions(mindmap.root, 0, ROOT_X, rootY, null);
  
  const posMap = new Map();
  for(const p of nodePositions) posMap.set(p.node.id, p);
  
  adjustSubtreePositions(mindmap.root, posMap);

  // Post-process: ensure single-child parent-child pairs are Y-center aligned
  for(const p of nodePositions){
    const { node, y, h } = p;
    if(!node.expanded || node.children.length !== 1) continue;
    const child = node.children[0];
    const cp = nodePositions.find(pp => pp.node.id === child.id);
    if(!cp) continue;
    const parentCenter = y + h / 2;
    cp.y = parentCenter - cp.h / 2;
  }
}

function adjustSubtreePositions(node, posMap){
  if(!node.expanded || node.children.length === 0) return;
  
  for(const c of node.children){
    adjustSubtreePositions(c, posMap);
  }
  
  if(node.children.length <= 1) return;
  
  const childrenWithBounds = node.children.map(c => ({
    node: c,
    bounds: getSubtreeBounds(c, posMap)
  }));
  
  const maxIterations = 5;
  for(let iter = 0; iter < maxIterations; iter++){
    let hasCollision = false;
    
    for(let i = 0; i < childrenWithBounds.length - 1; i++){
      const current = childrenWithBounds[i];
      const next = childrenWithBounds[i + 1];
      
      const hOverlap = current.bounds.left < next.bounds.right && current.bounds.right > next.bounds.left;
      if(!hOverlap) continue;
      
      const minGap = V_GAP;
      if(current.bounds.bottom + minGap > next.bounds.top){
        const shift = current.bounds.bottom + minGap - next.bounds.top;
        for(let j = i + 1; j < childrenWithBounds.length; j++){
          shiftSubtree(childrenWithBounds[j].node, shift, posMap);
          childrenWithBounds[j].bounds = getSubtreeBounds(childrenWithBounds[j].node, posMap);
        }
        hasCollision = true;
      }
    }
    
    if(!hasCollision) break;
  }
  
  const parentPos = posMap.get(node.id);
  const firstChild = childrenWithBounds[0];
  const lastChild = childrenWithBounds[childrenWithBounds.length - 1];
  const firstY = firstChild.bounds.top;
  const lastBottom = lastChild.bounds.bottom;
  const childrenCenter = (firstY + lastBottom) / 2;
  
  const parentH = parentPos.h;
  const newParentY = childrenCenter - parentH / 2;
  parentPos.y = newParentY;
}

function getSubtreeBounds(node, posMap){
  const rootPos = posMap.get(node.id);
  if(!rootPos) return {top:0, bottom:0, left:0, right:0};
  
  let minX = rootPos.x;
  let maxX = rootPos.x + rootPos.w;
  let minY = rootPos.y;
  let maxY = rootPos.y + rootPos.h;
  
  if(node.expanded && node.children && node.children.length > 0){
    for(const c of node.children){
      const childBounds = getSubtreeBounds(c, posMap);
      minX = Math.min(minX, childBounds.left);
      maxX = Math.max(maxX, childBounds.right);
      minY = Math.min(minY, childBounds.top);
      maxY = Math.max(maxY, childBounds.bottom);
    }
  }
  
  return {
    top: minY,
    bottom: maxY,
    left: minX,
    right: maxX
  };
}

function shiftSubtree(node, deltaY, posMap){
  const pos = posMap.get(node.id);
  if(pos) pos.y += deltaY;
  
  if(node.expanded && node.children){
    for(const c of node.children){
      shiftSubtree(c, deltaY, posMap);
    }
  }
}

/* ==================== SUMMARY SUBTREE RENDERING ==================== */
/* Render summary children subtree (layout + DOM + lines) */
function renderSummarySubtree(sum, sumX, sumY, sumW, sumH, wrapper, allSvgPaths){
  /* Recursively layout + render a list of nodes starting at (startX, startY) */
  function layoutChildren(nodes, depth, x, y){
    const positions = [];
    if(!nodes || nodes.length === 0) return positions;

    for(const node of nodes){
      const w = getNodeWidth(node);
      const h = node._nodeHeight || calcTextHeight(node.label, w, node.fontSize);
      const color = getNodeColor(node, depth, null);
      positions.push({ node, x, y, w, h, depth, color });
      if(node.expanded && node.children && node.children.length > 0){
        const childX = x + w + H_GAP;
        const childY = y + h / 2 - (node._treeHeight || h) / 2;
        const childPos = layoutChildren(node.children, depth + 1, childX, childY);
        for(const cp of childPos) positions.push(cp);
      }
      y += (node._treeHeight || h) + V_GAP;
    }
    return positions;
  }

  if(!sum.children || sum.children.length === 0) return [];

  /* Pre-calculate tree heights for summary children */
  function precalcHeights(nodes){
    for(const node of nodes){
      calcTreeHeight(node);
      if(node.children && node.children.length > 0) precalcHeights(node.children);
    }
  }
  precalcHeights(sum.children);

  const startX = sumX + sumW + H_GAP;
  const summaryCenterY = sumY + sumH / 2;

  /* Calculate total height of summary children tree */
  let totalH = 0;
  for(const c of sum.children){
    totalH += c._treeHeight || 0;
  }
  totalH += (sum.children.length - 1) * V_GAP;

  const startY = summaryCenterY - totalH / 2;
  const positions = layoutChildren(sum.children, 0, startX, startY);

  /* Render nodes */
  for(const p of positions){
    const el = document.createElement('div');
    let nodeCls = 'node';
    if(selectedId === p.node.id || multiSelected.has(p.node.id)) nodeCls += ' selected';
    el.className = nodeCls;
    el.dataset.id = p.node.id;
    el.dataset.depth = p.depth;
    el.style.cssText = `left:${p.x}px;top:${p.y}px;width:${p.w}px;background:${p.color.bg};border-color:${p.color.border};color:${p.color.text};border-radius:8px;padding:6px 8px;`;

    const foldBtn = document.createElement('span');
    foldBtn.className = 'fold-btn';
    if(p.node.children.length > 0){
      if(p.node.expanded){
        foldBtn.className = 'fold-btn minus';
        foldBtn.textContent = '\u2212';
        foldBtn.title = '折叠子节点';
      } else {
        const cnt = countDesc(p.node);
        foldBtn.className = 'fold-btn count';
        foldBtn.textContent = cnt > 99 ? '99+' : cnt;
        foldBtn.title = `展开 ${cnt} 个子节点`;
      }
    }
    el.appendChild(foldBtn);

    const label = document.createElement('span');
    label.className = 'label';
    if(p.node.fontSize) label.style.fontSize = p.node.fontSize + 'px';
    if(p.node.textAlign) label.style.textAlign = p.node.textAlign;
    label.innerHTML = p.node.label;
    el.appendChild(label);

    const ac = countAtt(p.node);
    const badge = document.createElement('span');
    badge.className = 'badge' + (ac > 0 ? ' has' : '');
    badge.textContent = ac > 0 ? '\uD83D\uDCCE' + ac : '';
    el.appendChild(badge);

    wrapper.appendChild(el);
  }

  /* Render connection lines for summary subtree -- match main tree style */
  let linePaths = '';
  for(const p of positions){
    const { node, x, y, w, h } = p;
    // Draw connection from parent to this node
    const parent = positions.find(pp =>
      pp.node.expanded && pp.node.children &&
      pp.node.children.some(c => c.id === node.id)
    );
    if(parent){
      const sx = parent.x + parent.w;
      const sy = parent.y + parent.h / 2;
      const ex = x;
      const ey = y + h / 2;
      if(parent.node.children.length === 1){
        linePaths += `<path d="M${sx} ${sy} L${ex} ${ey}" stroke="#bbb" stroke-width="1.5" fill="none"/>`;
      } else {
        const mx = sx + 20;
        linePaths += `<path d="M${sx} ${sy} L${mx} ${sy} L${mx} ${ey} L${ex} ${ey}" stroke="#bbb" stroke-width="1.5" fill="none"/>`;
      }
      continue;
    }
    // Direct child of summary -- draw from summary node with orthogonal path
    if(sum.children.some(c => c.id === node.id)){
      const sx = sumX + sumW;
      const sy = sumY + sumH / 2;
      const ex = x;
      const ey = y + h / 2;
      if(sum.children.length === 1){
        linePaths += `<path d="M${sx} ${sy} L${ex} ${ey}" stroke="#bbb" stroke-width="1.5" fill="none"/>`;
      } else {
        const mx = sx + 20;
        linePaths += `<path d="M${sx} ${sy} L${mx} ${sy} L${mx} ${ey} L${ex} ${ey}" stroke="#bbb" stroke-width="1.5" fill="none"/>`;
      }
    }
  }

  return { positions, linePaths };
}

/* ==================== RENDER ==================== */
function fullRender(){
  try {
    if(!mindmap){ document.getElementById('mindmap-tree').innerHTML=''; return; }
    document.getElementById('title-input').value = mindmap.title;
    document.title = mindmap.root.label || mindmap.title || '实验脑图';
    depth1Colors = {};
    renderTree();
    renderPanel();
    document.getElementById('width-input').value = globalNodeWidth;
    document.getElementById('btn-width-selected').disabled = !selectedId;
    updateZoomStage();
  } catch(e){
    console.error('fullRender error:', e);
    var er = document.getElementById('init-error');
    if(er){ er.style.display='block'; er.textContent = '渲染失败: ' + e.message; }
  }
}

function updateZoomStage(){
  const stage = document.getElementById('zoom-stage');
  stage.style.width = (totalCanvasW * zoomLevel) + 'px';
  stage.style.height = (totalCanvasH * zoomLevel) + 'px';
  stage.style.transform = 'scale(' + zoomLevel + ')';
  document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
}

function renderTree(){
  const container = document.getElementById('mindmap-tree');
  if(!mindmap){ container.innerHTML=''; return; }

  mindmap.root._treeHeight = calcTreeHeight(mindmap.root);
  layoutWithCollisionAvoidance();

  let maxX = 0, maxY = 0, minY = Infinity;
  for(const p of nodePositions){
    maxX = Math.max(maxX, p.x + p.w);
    maxY = Math.max(maxY, p.y + p.h);
    minY = Math.min(minY, p.y);
  }
  const yShift = minY < 40 ? (40 - minY) : 0;
  if(yShift > 0 || minY < 0){
    const shift = yShift || (-minY + 40);
    for(const p of nodePositions) p.y += shift;
    maxY = 0;
    for(const p of nodePositions) maxY = Math.max(maxY, p.y + p.h);
  }
  totalCanvasW = maxX + 100;

  // Include summary nodes in canvas size calculation
  if(mindmap.summaries){
    for(const sum of mindmap.summaries){
      let sumMaxX = maxX;
      for(const nid of sum.nodeIds){
        const np = nodePositions.find(pp => pp.node.id === nid);
        if(np) sumMaxX = Math.max(sumMaxX, np.x + np.w);
      }
      totalCanvasW = Math.max(totalCanvasW, sumMaxX + 120);
    }
  }
  totalCanvasH = maxY + 120;

  const wrapper = document.createElement('div');
  wrapper.style.cssText = `position:relative;width:${totalCanvasW}px;height:${totalCanvasH}px`;

  for(const p of nodePositions){
    const el = document.createElement('div');
    let nodeCls = 'node';
    if(selectedId === p.node.id || multiSelected.has(p.node.id)) nodeCls += ' selected';
    if(linkMode && p.node.id === linkSourceId) nodeCls += ' link-source';
    if(linkMode && p.node.id !== linkSourceId) nodeCls += ' link-target-hint';
    el.className = nodeCls;
    el.dataset.id = p.node.id;
    el.dataset.depth = p.depth;
    const isRounded = currentThemeName === 'rounded';
    const radiusStyle = isRounded ? 'border-radius:999px;padding:8px 18px;' : 'border-radius:8px;padding:6px 8px;';
    el.style.cssText = `left:${p.x}px;top:${p.y}px;width:${p.w}px;background:${p.color.bg};border-color:${p.color.border};color:${p.color.text};${radiusStyle}`;

    const foldBtn = document.createElement('span');
    foldBtn.className = 'fold-btn';
    if(p.node.children.length > 0){
      if(p.node.expanded){
        foldBtn.className = 'fold-btn minus';
        foldBtn.textContent = '\u2212';
        foldBtn.title = '折叠子节点';
      } else {
        const cnt = countDesc(p.node);
        foldBtn.className = 'fold-btn count';
        foldBtn.textContent = cnt > 99 ? '99+' : cnt;
        foldBtn.title = `展开 ${cnt} 个子节点`;
      }
    }
    el.appendChild(foldBtn);

    const label = document.createElement('span');
    label.className = 'label';
    if(p.node.fontSize) label.style.fontSize = p.node.fontSize + 'px';
    if(p.node.textAlign) label.style.textAlign = p.node.textAlign;
    label.innerHTML = p.node.label;
    el.appendChild(label);

    const ac = countAtt(p.node);
    const badge = document.createElement('span');
    badge.className = 'badge' + (ac > 0 ? ' has' : '');
    badge.textContent = ac > 0 ? '\uD83D\uDCCE' + ac : '';
    el.appendChild(badge);

    wrapper.appendChild(el);
  }

  let svgPaths = '';
  const isRoundedTheme = currentThemeName === 'rounded';
  for(const p of nodePositions){
    const { node, x, y, w, h } = p;
    if(!node.expanded || node.children.length === 0) continue;
    for(const child of node.children){
      const cp = nodePositions.find(pp => pp.node.id === child.id);
      if(!cp) continue;
      const sx = x + w;
      const startY = y + h / 2;
      const ex = cp.x;
      const ey = cp.y + cp.h / 2;
      const lineColor = isRoundedTheme ? '#8fa84f' : '#bbb';
      const lineWidth = isRoundedTheme ? 4 : 1.5;
      if(isRoundedTheme && node.children.length > 1){
        const c1x = sx + (ex - sx) * 0.7;
        const c1y = startY;
        const c2x = ex - (ex - sx) * 0.3;
        const c2y = ey;
        svgPaths += `<path d="M${sx} ${startY} C${c1x} ${c1y}, ${c2x} ${c2y}, ${ex} ${ey}" stroke="${lineColor}" stroke-width="${lineWidth}" fill="none" stroke-linecap="round"/>`;
      } else if(node.children.length === 1){
        svgPaths += `<path d="M${sx} ${startY} L${ex} ${ey}" stroke="${lineColor}" stroke-width="${isRoundedTheme ? lineWidth : 1.5}" fill="none" stroke-linecap="round"/>`;
      } else {
        const mx = sx + 20;
        svgPaths += `<path d="M${sx} ${startY} L${mx} ${startY} L${mx} ${ey} L${ex} ${ey}" stroke="#bbb" stroke-width="1.5" fill="none"/>`;
      }
    }
  }
  if(svgPaths){
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', totalCanvasW);
    svg.setAttribute('height', totalCanvasH);
    svg.innerHTML = svgPaths;
    wrapper.appendChild(svg);
  }

  // Draw cross-links (dashed curves) with draggable handles
  if(mindmap.crossLinks && mindmap.crossLinks.length > 0){
    let clPaths = '';
    let clHandles = '';
    for(const cl of mindmap.crossLinks){
      const fp = nodePositions.find(pp => pp.node.id === cl.from);
      const tp = nodePositions.find(pp => pp.node.id === cl.to);
      if(!fp || !tp) continue;
      const pathInfo = computeCrossLinkPath(cl, fp, tp, nodePositions);
      const color = cl.color || '#e9891e';
      const sel = (cl.id === selectedCrossLinkId) ? ' selected-link' : '';
      clPaths += `<path class="cross-link-path${sel}" data-clid="${cl.id}" d="${pathInfo.d}" stroke="${color}" stroke-width="2.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round" style="pointer-events:stroke"/>`;
      clHandles += `<circle class="cross-link-handle" data-clid="${cl.id}" cx="${pathInfo.hx}" cy="${pathInfo.hy}" r="4.5" style="pointer-events:all"/>`;
    }
    if(clPaths){
      const clSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      clSvg.setAttribute('width', totalCanvasW);
      clSvg.setAttribute('height', totalCanvasH);
      clSvg.setAttribute('class', 'cross-links-layer');
      clSvg.style.cssText = 'pointer-events:none';
      clSvg.innerHTML = clPaths + clHandles;
      wrapper.appendChild(clSvg);
    }
  }

  // Draw summaries (curly braces + summary nodes + children)
  if(mindmap.summaries && mindmap.summaries.length > 0){
    let sumPaths = '';
    let sumLinePaths = '';
    for(const sum of mindmap.summaries){
      const positions = [];
      for(const nid of sum.nodeIds){
        const np = nodePositions.find(pp => pp.node.id === nid);
        if(np) positions.push(np);
      }
      if(positions.length === 0) continue;
      let minY = Infinity, maxY = -Infinity, maxX = -Infinity;
      for(const np of positions){
        minY = Math.min(minY, np.y);
        maxY = Math.max(maxY, np.y + np.h);
        maxX = Math.max(maxX, np.x + np.w);
      }
      const bx = maxX + 18;
      const by1 = minY + 6;
      const by2 = maxY - 6;
      const byMid = (by1 + by2) / 2;
      const tipX = bx + 28;
      // Curly brace path facing right
      const braceD = `M${bx} ${by1} C${bx+16} ${by1} ${bx+22} ${by1+6} ${bx+18} ${by1+12} L${bx+18} ${byMid-10} C${bx+18} ${byMid-4} ${tipX} ${byMid-4} ${tipX} ${byMid} C${tipX} ${byMid+4} ${bx+18} ${byMid+4} ${bx+18} ${byMid+10} L${bx+18} ${by2-12} C${bx+22} ${by2-6} ${bx+16} ${by2} ${bx} ${by2}`;
      const sumSelected = (selectedSummaryId === sum.id) ? ' selected' : '';
      sumPaths += `<path class="summary-brace${sumSelected}" data-sumid="${sum.id}" d="${braceD}" stroke="#409eff" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;
      // Summary node
      const sumW = calcTextWidth(sum.label || '概要', 14) + 28;
      const sumH = 32;
      const sumX = tipX + 6;
      const sumY = byMid - 14;
      const sumNode = document.createElement('div');
      sumNode.className = 'summary-node' + sumSelected;
      sumNode.dataset.sumid = sum.id;
      sumNode.textContent = sum.label || '概要';
      sumNode.style.left = sumX + 'px';
      sumNode.style.top = sumY + 'px';
      sumNode.style.width = sumW + 'px';
      sumNode.style.height = sumH + 'px';
      sumNode.style.lineHeight = (sumH - 12) + 'px';
      wrapper.appendChild(sumNode);

      // Render summary children subtree
      if(sum.children && sum.children.length > 0){
        const result = renderSummarySubtree(sum, sumX, sumY, sumW, sumH, wrapper);
        sumLinePaths += result.linePaths;
        // Merge child positions into nodePositions so they can be found by findNodeInSummaries etc.
        for(const cp of result.positions){
          if(!nodePositions.some(p => p.node.id === cp.node.id)){
            nodePositions.push(cp);
          }
        }
        // Update totalCanvasW/H to include summary children
        for(const cp of result.positions){
          totalCanvasW = Math.max(totalCanvasW, cp.x + cp.w + 120);
          totalCanvasH = Math.max(totalCanvasH, cp.y + cp.h + 80);
        }
        wrapper.style.width = totalCanvasW + 'px';
        wrapper.style.height = totalCanvasH + 'px';
      }
    }
    if(sumPaths){
      const sumSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      sumSvg.setAttribute('width', totalCanvasW);
      sumSvg.setAttribute('height', totalCanvasH);
      sumSvg.style.cssText = 'pointer-events:none';
      sumSvg.innerHTML = sumPaths + sumLinePaths;
      wrapper.appendChild(sumSvg);
    }
  }

  let snSvgPaths = '';
  for(const p of nodePositions){
    const {node, x, y, w, h} = p;
    if(!node.sideNotes || node.sideNotes.length === 0) continue;
    const snW = Math.max(w, 160);
    let snY = y + h + 4;
    const lineTop = y + h;
    const lineBot = snY;
    const lineX = x + w / 2;
    snSvgPaths += `<line x1="${lineX}" y1="${lineTop}" x2="${lineX}" y2="${lineBot}" stroke="#d4b84c" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>`;
    for(const sn of node.sideNotes){
      const snEl = document.createElement('div');
      snEl.className = 'side-note';
      snEl.dataset.snid = sn.id;
      snEl.dataset.nid = node.id;
      snEl.textContent = sn.text || '旁注...';
      snEl.style.cssText = `left:${x}px;top:${snY}px;width:${snW}px`;
      const delBtn = document.createElement('span');
      delBtn.className = 'sn-del';
      delBtn.textContent = '✕';
      delBtn.title = '删除旁注';
      snEl.appendChild(delBtn);
      wrapper.appendChild(snEl);
      snY += 30;
    }
  }
  if(snSvgPaths){
    const snSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    snSvg.setAttribute('width', totalCanvasW);
    snSvg.setAttribute('height', totalCanvasH);
    snSvg.innerHTML = snSvgPaths;
    wrapper.appendChild(snSvg);
  }

  container.innerHTML = '';
  container.appendChild(wrapper);
}

function renderPanel(){
  document.getElementById('inline-editor').style.display='none';
  document.getElementById('panel-list').style.display='';
  noteEditTarget = null;

  const panel = document.getElementById('attach-panel');
  const title = document.getElementById('panel-title');
  const list = document.getElementById('panel-list');

  document.getElementById('panel-toggle').classList.remove('show');

  if(!selectedId || !mindmap){
    title.textContent = '选择节点查看附件';
    list.innerHTML = '<div class="empty-hint">选择节点后查看附件</div>';
    return;
  }
  const node = findNode(selectedId, mindmap.root);
  if(!node){
    title.textContent = '选择节点查看附件';
    list.innerHTML = '<div class="empty-hint">选择节点后查看附件</div>';
    return;
  }

  title.textContent = '附件';

  if(node.attachments.length===0){
    list.innerHTML = '<div class="empty-hint">暂无附件，点击上方按钮或 Ctrl+V 粘贴图片</div>';
    return;
  }

  let h = '';
  for(const a of node.attachments) h += cardHTML(a, node.id);
  list.innerHTML = h;
}

function cardHTML(a, nid){
  let extra='';
  if(a.type==='note'){
    const hasContent = a.data && a.data.length > 0;
    if(hasContent){
      // 用纯文本长度判断是否展开，但渲染时用 innerHTML（支持图片）
      const textLen = a.data.replace(/<[^>]*>/g,'').length;
      const hasImg = /<img\s/i.test(a.data);
      const needToggle = textLen > 80 || hasImg;
      const collapsible = needToggle ? ' collapsible' : '';
      extra = `<div class="note-preview${collapsible}" data-type="note">${a.data}</div>`;
      if(needToggle){
        extra += `<span class="note-toggle" data-action="toggle-note">展开 ▼</span>`;
      }
    } else {
      extra = `<div class="note-preview" data-type="note">(空笔记)</div>`;
    }
  } else if(a.type==='image'){
    extra = `<img class="img-thumb" src="${a.data}" alt="${esc(a.name)}" data-aid="${a.id}" data-nid="${nid}">`;
  } else {
    extra = '';
  }
  const sz = a.size ? formatSize(a.size) : '';
  // Prefix file type icon in name
  let namePrefix = '';
  if(a.type==='file') namePrefix = '<span style="margin-right:3px">📄</span>';
  else if(a.type==='image') namePrefix = '<span style="margin-right:3px">🖼️</span>';
  else if(a.type==='note') namePrefix = '<span style="margin-right:3px">📝</span>';
  let btns = '';
  if(a.type==='note') btns += `<button class="btn-edit-note" data-nid="${nid}" data-aid="${a.id}">✏️</button>`;
  if(a.type==='image') btns += `<button class="btn-view-img" data-nid="${nid}" data-aid="${a.id}">👁️</button>`;
  if(a.type==='file') btns += `<button class="btn-dl-file" data-nid="${nid}" data-aid="${a.id}">⬇️</button>`;
  btns += `<button class="btn-cmt-att" data-nid="${nid}" data-aid="${a.id}">💬</button>`;
  btns += `<button class="btn-del-att" data-nid="${nid}" data-aid="${a.id}">🗑️</button>`;

  const commentSection = a.comment
    ? `<div class="comment-preview cmt-preview-${a.id}" data-nid="${nid}" data-aid="${a.id}"><span style="margin-right:3px">💬</span>${a.comment}</div>`
    : `<div class="comment-preview cmt-preview-${a.id}" data-nid="${nid}" data-aid="${a.id}" style="display:none">💬</div>`;

  return `<div class="attach-card">
    <div class="card-header"><span class="card-name">${namePrefix}${esc(a.name)}</span><span class="card-size">${sz}</span></div>
    ${extra}
    ${commentSection}
    <div class="comment-edit cmt-edit-${a.id}" data-nid="${nid}" data-aid="${a.id}">
      <div class="note-fmt-toolbar">
        <button data-cmd="bold" title="加粗"><b>B</b></button>
        <button data-cmd="italic" title="斜体"><i>I</i></button>
        <button data-cmd="underline" title="下划线"><u>U</u></button>
        <span class="note-fmt-sep"></span>
        <select class="note-fmt-size">
          <option value="">字号</option>
          <option value="1">12</option><option value="2">14</option><option value="3">16</option>
          <option value="4">18</option><option value="5">24</option><option value="6">28</option><option value="7">36</option>
        </select>
        <input type="color" class="note-fmt-color" title="文字颜色" value="#303133">
      </div>
      <div class="cmt-editor cmt-textarea-${a.id}" contenteditable="true" placeholder="添加备注...">${a.comment || ''}</div>
      <div class="comment-btns">
        <button class="cmt-cancel" data-nid="${nid}" data-aid="${a.id}">取消</button>
        <button class="cmt-save" data-nid="${nid}" data-aid="${a.id}">保存</button>
      </div>
    </div>
    <div class="card-actions">${btns}</div>
  </div>`;
}

/* ==================== SELECTION & EVENTS ==================== */
function selectNode(id, ctrl){
  if(ctrl){
    if(multiSelected.has(id)){
      multiSelected.delete(id);
      if(selectedId === id) selectedId = multiSelected.size ? [...multiSelected][multiSelected.size-1] : null;
    } else {
      multiSelected.add(id);
      selectedId = id;
    }
  } else {
    multiSelected.clear();
    if(id) multiSelected.add(id);
    selectedId = id;
  }
  document.querySelectorAll('#mindmap-tree .node.selected').forEach(el => el.classList.remove('selected'));
  for(const sid of multiSelected){
    const el = document.querySelector(`#mindmap-tree .node[data-id="${sid}"]`);
    if(el) el.classList.add('selected');
  }
  document.getElementById('btn-width-selected').disabled = !selectedId;
  renderPanel();
  hideInlineLabelInput();
}

function hideInlineLabelInput(){
  const inp = document.getElementById('inline-label-input');
  if(inp){
    inp.style.display = 'none';
    // 清除之前设置的背景/边框，避免残留
    inp.style.background = 'transparent';
    inp.style.border = 'none';
    inp.style.borderColor = '';
    inp.style.borderStyle = '';
    inp.style.borderWidth = '';
    inp.style.borderRadius = '';
    inp.style.boxShadow = 'none';
  }
  document.querySelectorAll('#mindmap-tree .node .label[style*="visibility: hidden"]').forEach(el => el.style.visibility = '');
}

/* 缩放/滚动/平移后重新定位正在编辑的标签输入框 */
function repositionIfEditing(){
  const inp = document.getElementById('inline-label-input');
  if(inp && inp.style.display !== 'none' && selectedId){
    positionInlineInput();
  }
}

function positionInlineInput(){
  const inp = document.getElementById('inline-label-input');
  if(!selectedId){
    inp.style.display = 'none';
    return;
  }
  const nodeEl = document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);
  if(!nodeEl){
    inp.style.display = 'none';
    return;
  }
  const labelEl = nodeEl.querySelector('.label');
  if(!labelEl){
    inp.style.display = 'none';
    return;
  }

  const n = findNode(selectedId, mindmap.root);

  // 用 getBoundingClientRect 精确获取节点框位置
  const rect = nodeEl.getBoundingClientRect();
  const cs = window.getComputedStyle(nodeEl);
  const padL = parseFloat(cs.paddingLeft) || 0;
  const padT = parseFloat(cs.paddingTop) || 0;
  const padR = parseFloat(cs.paddingRight) || 0;
  const padB = parseFloat(cs.paddingBottom) || 0;
  const borderW = parseFloat(cs.borderLeftWidth) || 0;

  // 输入框有 1.5px 边框，left/top 需额外偏移 -1.5 使 content 对齐节点 content box
  const inpBorder = 1.5;
  inp.style.position = 'fixed';
  inp.style.left = (rect.left + borderW + padL - inpBorder) + 'px';
  inp.style.top = (rect.top + borderW + padT - inpBorder) + 'px';
  // content width = 节点 content box 宽度（不含输入框自身边框）
  const contentW = rect.width - borderW * 2 - padL - padR;
  inp.style.minWidth = contentW + 'px';
  inp.style.width = contentW + 'px';
  inp.style.minHeight = (rect.height - borderW * 2 - padT - padB) + 'px';
  // 同步节点的 padding，使文字排版与 label 完全一致
  inp.style.padding = '0';

  // 继承节点框的背景/边框/圆角——让输入框宽度自适应时视觉上节点框同步扩展
  inp.style.color = nodeEl.style.color || '#303133';
  inp.style.fontSize = Math.round((n && n.fontSize ? n.fontSize : 15) * zoomLevel) + 'px';
  inp.style.textAlign = (n && n.textAlign ? n.textAlign : '');
  inp.style.background = nodeEl.style.background || 'transparent';
  inp.style.borderColor = nodeEl.style.borderColor || '#ccc';
  inp.style.borderStyle = 'solid';
  inp.style.borderWidth = '1.5px';
  inp.style.borderRadius = getComputedStyle(nodeEl).borderRadius || '8px';
  inp.style.boxShadow = 'none';
  inp.style.outline = 'none';
  inp.style.display = '';
  inp.style.zIndex = '100';

  // 隐藏原始 label
  labelEl.style.visibility = 'hidden';
  if(n) inp.innerHTML = n.label || '';

  // 自适应宽高
  autoResizeInlineInput();
}

/* ======= Format Toolbar ======= */
function positionFmtToolbar(){
  const tb = document.getElementById('fmt-toolbar');
  const inp = document.getElementById('inline-label-input');
  if(!tb || !inp || inp.style.display === 'none'){ tb.style.display='none'; return; }
  const r = inp.getBoundingClientRect();
  tb.style.left = r.left + 'px';
  // 优先放在上方，若空间不足则放在输入框下方，避免遮挡节点
  const aboveTop = r.top - tb.offsetHeight - 4;
  if(aboveTop >= 4){
    tb.style.top = aboveTop + 'px';
  } else {
    tb.style.top = (r.bottom + 4) + 'px';
  }
  tb.style.display = 'inline-flex';
}
function hideFmtToolbar(){
  const tb = document.getElementById('fmt-toolbar');
  if(tb) tb.style.display = 'none';
}
var _savedSelection = null;
function wrapSelColor(cmd, color, savedRange){
  // cmd: 'foreColor' or 'hiliteColor'
  // Manually wrap selection in <span style> to avoid execCommand unreliability
  var sel = window.getSelection();
  var range = null;
  // Use savedRange if provided (for note editor where selection is lost)
  if(savedRange){
    range = savedRange;
  } else if(sel && sel.rangeCount > 0 && !sel.isCollapsed){
    range = sel.getRangeAt(0);
  } else {
    return;
  }
  var selectedText = range.toString();
  if(!selectedText) return;
  var styleProp = cmd === 'foreColor' ? 'color' : 'background-color';
  var span = document.createElement('span');
  span.style.cssText = styleProp + ':' + color + ';';
  span.textContent = selectedText;
  range.deleteContents();
  range.insertNode(span);
  // Restore selection to the new span
  if(sel){ sel.removeAllRanges(); }
  var newRange = document.createRange();
  newRange.selectNodeContents(span);
  if(sel){ sel.addRange(newRange); }
}
function execFmt(cmd, val){
  const inp = document.getElementById('inline-label-input');
  // 恢复保存的选区再执行命令（解决点击工具栏时选区丢失问题）
  if(inp && _savedSelection && document.activeElement !== inp){
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(_savedSelection);
    inp.focus();
  }
  document.execCommand(cmd, false, val || null);
  _savedSelection = null;
  positionFmtToolbar();
}
function updateFmtBtnStates(){
  const tb = document.getElementById('fmt-toolbar');
  const btns = tb.querySelectorAll('button[data-cmd]');
  for(const b of btns){
    const st = document.queryCommandState(b.dataset.cmd);
    b.classList.toggle('active', st);
  }
}

function focusInlineInput(){
  const inp = document.getElementById('inline-label-input');
  if(selectedId && inp.style.display !== 'none'){
    inp.focus();
  }
}

function toggleExpand(id){
  const n = findNode(id, mindmap.root);
  if(!n || n.children.length===0) return;
  saveSnapshot();
  n.expanded = !n.expanded;
  fullRender();

    const el = document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);

/* ==================== NODE OPERATIONS ==================== */
function addChild(pid){
  const p = findNode(pid, mindmap.root);
  if(!p) return;
  saveSnapshot();
  const n = createNode('');
  p.children.push(n);
  p.expanded = true;
  selectedId = n.id;
  fullRender();
  scrollToNode(n.id);
  startEditing(n.id);
}

function addSibling(id){
  // Try main tree first
  let p = findParent(id, mindmap.root);
  let targetArr = null;
  if(p){
    const idx = p.children.findIndex(c=>c.id===id);
    if(idx===-1) return;
    targetArr = p.children;
    _doAddSibling(targetArr, idx);
    return;
  }
  // Try summary tree
  const sp = findParentInSummary(id);
  if(sp){
    targetArr = sp.parent ? sp.parent.children : sp.summary.children;
    const idx = targetArr.findIndex(c=>c.id===id);
    if(idx===-1) return;
    _doAddSibling(targetArr, idx);
  }
}
function _doAddSibling(targetArr, idx){
  saveSnapshot();
  const n = createNode('');
  targetArr.splice(idx+1,0,n);
  selectedId = n.id;
  fullRender();
  scrollToNode(n.id);
  startEditing(n.id);
}

function deleteNode(id){
  const n = findNode(id, mindmap.root);
  if(!n) return;
  if(id===mindmap.root.id){alert('不能删除根节点');return}
  saveSnapshot();

  // Try main tree
  let p = findParent(id, mindmap.root);
  if(p){
    p.children = p.children.filter(c=>c.id!==id);
    _cleanupAfterDelete(id);
    return;
  }
  // Try summary tree
  const sp = findParentInSummary(id);
  if(sp){
    const targetArr = sp.parent ? sp.parent.children : sp.summary.children;
    const idx = targetArr.findIndex(c=>c.id===id);
    if(idx !== -1) targetArr.splice(idx, 1);
    _cleanupAfterDelete(id);
  }
}
function _cleanupAfterDelete(id){
  if(selectedId===id) selectedId=null;
  multiSelected.delete(id);
  fullRender();
}

function deleteSelectedNodes(){
  if(!selectedId) return;
  const ids = [...multiSelected];
  if(ids.length === 0) ids.push(selectedId);
  const hasRoot = ids.includes(mindmap.root.id);
  if(hasRoot){alert('不能删除根节点'); ids.splice(ids.indexOf(mindmap.root.id),1)}
  if(ids.length===0) return;
  saveSnapshot();
  for(const id of ids){
    // Try main tree
    const p = findParent(id, mindmap.root);
    if(p){
      p.children = p.children.filter(c=>c.id!==id);
    } else {
      // Try summary tree
      const sp = findParentInSummary(id);
      if(sp){
        const targetArr = sp.parent ? sp.parent.children : sp.summary.children;
        const idx = targetArr.findIndex(c=>c.id===id);
        if(idx !== -1) targetArr.splice(idx, 1);
      }
    }
  }
  selectedId=null; multiSelected.clear();
  fullRender();
}

function scrollToNode(id){
  const el = document.querySelector(`#mindmap-tree .node[data-id="${id}"]`);
  if(el){
    el.scrollIntoView({block:'center',inline:'center'});
  }
}

/* ==================== EDITING (OPTIMIZED) ==================== */
function startEditing(id){
  selectNode(id);
  positionInlineInput();
  const inp = document.getElementById('inline-label-input');
  if(inp) inp.focus();
  // 不调 setSelectionRange——让 IME/浏览器自然接管光标位置
}

/* 【优化】文本框自适应：动态调整宽高 */
function autoResizeInlineInput(){
  const inp = document.getElementById('inline-label-input');
  if(inp.style.display === 'none') return;
  
  // 用隐藏 clone 测量文本实际宽度（white-space:pre 不折行，精确取宽）
  const clone = document.createElement('span');
  clone.style.cssText = 'position:fixed;visibility:hidden;white-space:pre;font-size:' + inp.style.fontSize + ';font-family:inherit;letter-spacing:inherit';
  clone.textContent = inp.textContent || ' ';
  document.body.appendChild(clone);
  const textW = clone.offsetWidth;
  document.body.removeChild(clone);

  const minW = parseFloat(inp.style.minWidth) || 100;
  const newW = Math.max(minW, Math.min(textW + 20, window.innerWidth - 40));
  inp.style.width = newW + 'px';

  // 高度自适应
  inp.style.height = 'auto';
  const newH = Math.max(inp.scrollHeight, 30);
  inp.style.height = newH + 'px';

  // 重新定位工具栏
  positionFmtToolbar();
}

/* ==================== SIDE NOTES ==================== */
let editingSidenoteId = null;

function addSideNote(nid){
  const n = findNode(nid, mindmap.root);
  if(!n) return;
  if(!n.sideNotes) n.sideNotes = [];
  saveSnapshot();
  const sn = {id: genId(), text: ''};
  n.sideNotes.push(sn);
  fullRender();
  startSideNoteEdit(nid, sn.id);
}

function startSideNoteEdit(nid, snid){
  editingSidenoteId = {nodeId: nid, snId: snid};
  const snEl = document.querySelector(`.side-note[data-nid="${nid}"][data-snid="${snid}"]`);
  if(!snEl) return;
  snEl.classList.add('editing');
  snEl.contentEditable = true;
  snEl.focus();
  setTimeout(() => positionFmtToolbarForEl(snEl), 50);
  const sel = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(snEl);
  sel.removeAllRanges();
  sel.addRange(range);
}

function commitSideNote(nid, snid){
  const n = findNode(nid, mindmap.root);
  if(!n || !n.sideNotes) return;
  const sn = n.sideNotes.find(s => s.id === snid);
  if(!sn) return;
  const snEl = document.querySelector(`.side-note[data-nid="${nid}"][data-snid="${snid}"]`);
  if(!snEl) return;
  snEl.contentEditable = false;
  snEl.classList.remove('editing');
  const text = snEl.textContent.trim();
  if(text !== sn.text){
    sn.text = text;
    mindmap.updatedAt = nowISO();
    markDirty();
  }
  editingSidenoteId = null;
  hideFmtToolbar();
}
function deleteSideNote(nid, snid){
  const n = findNode(nid, mindmap.root);
  if(!n || !n.sideNotes) return;
  saveSnapshot();
  n.sideNotes = n.sideNotes.filter(s => s.id !== snid);
  fullRender();
}

/* ==================== ATTACHMENTS ==================== */
function addNote(nid){
  noteEditTarget = {nodeId:nid, attachId:null};
  const n = findNode(nid, mindmap.root);
  document.getElementById('inline-editor-title').textContent='添加笔记';
  document.getElementById('inline-editor-text').innerHTML='';
  showInlineEditor();
}
function showInlineEditor(){
  document.getElementById('inline-editor').style.display='block';
  document.getElementById('panel-list').style.display='none';
  setTimeout(()=>document.getElementById('inline-editor-text').focus(),100);
}
function hideInlineEditor(){
  document.getElementById('inline-editor').style.display='none';
  document.getElementById('panel-list').style.display='';
  noteEditTarget=null;
}

function editNote(nid, aid){
  const n = findNode(nid, mindmap.root);
  if(!n) return;
  const a = n.attachments.find(x=>x.id===aid);
  if(!a||a.type!=='note') return;
  noteEditTarget = {nodeId:nid, attachId:aid};
  document.getElementById('inline-editor-title').textContent='编辑笔记';
  document.getElementById('inline-editor-text').innerHTML=a.data||'';
  showInlineEditor();
}

function saveNote(){
  if(!noteEditTarget) return;
  const {nodeId, attachId} = noteEditTarget;
  const n = findNode(nodeId, mindmap.root);
  if(!n) return;
  const text = document.getElementById('inline-editor-text').innerHTML;
  if(attachId){
    const a = n.attachments.find(x=>x.id===attachId);
    if(a) a.data=text;
  } else {
    n.attachments.push(createAtt('note','笔记_'+nowISO().slice(0,10),text,'text/html',text.length));
  }
  mindmap.updatedAt=nowISO();
  markDirty();
  hideInlineEditor();
  fullRender();
}

function addImages(nid, files){
  const n = findNode(nid, mindmap.root);
  if(!n) return;
  for(const f of files){
    const r = new FileReader();
    r.onload=e=>{n.attachments.push(createAtt('image',f.name,e.target.result,f.type,f.size));mindmap.updatedAt=nowISO();markDirty();fullRender()};
    r.readAsDataURL(f);
  }
}

function addFiles(nid, files){
  const n = findNode(nid, mindmap.root);
  if(!n) return;
  for(const f of files){
    const r = new FileReader();
    r.onload=e=>{n.attachments.push(createAtt('file',f.name,e.target.result,f.type,f.size));mindmap.updatedAt=nowISO();markDirty();fullRender()};
    r.readAsDataURL(f);
  }
}

function delAtt(nid, aid){
  const n = findNode(nid, mindmap.root);
  if(!n) return;
  n.attachments = n.attachments.filter(x=>x.id!==aid);
  mindmap.updatedAt=nowISO();
  markDirty();
  fullRender();
}

function toggleComment(nid, aid){
  const editBox = document.querySelector(`.cmt-edit-${aid}`);
  if(!editBox) return;
  if(editBox.style.display === 'block'){
    editBox.style.display = 'none';
  } else {
    document.querySelectorAll('.comment-edit').forEach(el => el.style.display = 'none');
    editBox.style.display = 'block';
    const ed = editBox.querySelector('.cmt-editor');
    if(ed) setTimeout(() => ed.focus(), 50);
  }
}

function saveComment(nid, aid){
  const n = findNode(nid, mindmap.root);
  if(!n) return;
  const a = n.attachments.find(x => x.id === aid);
  if(!a) return;
  const ed = document.querySelector(`.cmt-textarea-${aid}`);
  if(!ed) return;
  const html = ed.innerHTML.replace(/<br\s*\/?>/gi,'').trim();
  a.comment = html === '' ? '' : ed.innerHTML.trim();
  const editBox = document.querySelector(`.cmt-edit-${aid}`);
  if(editBox) editBox.style.display = 'none';
  // Update preview
  const preview = document.querySelector(`.cmt-preview-${aid}`);
  if(preview){
    if(a.comment){
      preview.innerHTML = `<span style="margin-right:3px">💬</span>${a.comment}`;
      preview.style.display = '';
    } else {
      preview.innerHTML = '💬';
      preview.style.display = 'none';
    }
  }
  mindmap.updatedAt = nowISO();
  markDirty();
}

function cancelComment(nid, aid){
  const editBox = document.querySelector(`.cmt-edit-${aid}`);
  if(!editBox) return;
  const n = findNode(nid, mindmap.root);
  if(!n) return;
  const a = n.attachments.find(x => x.id === aid);
  if(!a) return;
  const ed = editBox.querySelector('.cmt-editor');
  if(ed) ed.innerHTML = a.comment || '';
  editBox.style.display = 'none';
}

function toggleNoteExpand(toggleEl){
  const card = toggleEl.closest('.attach-card');
  if(!card) return;
  const preview = card.querySelector('.note-preview');
  if(!preview) return;
  if(preview.classList.contains('expanded')){
    preview.classList.remove('expanded');
    toggleEl.textContent = '展开 ▼';
  } else {
    preview.classList.add('expanded');
    toggleEl.textContent = '收起 ▲';
  }
}

function dlFile(nid, aid){
  const n = findNode(nid, mindmap.root);
  if(!n) return;
  const a = n.attachments.find(x=>x.id===aid);
  if(!a) return;
  const el = document.createElement('a');
  el.href=a.data; el.download=a.name;
  document.body.appendChild(el); el.click(); document.body.removeChild(el);
}

function viewImg(nid, aid){
  const n = findNode(nid, mindmap.root);
  if(!n) return;
  const a = n.attachments.find(x=>x.id===aid);

/* ==================== WIDTH OPERATIONS ==================== */
function applyWidthToAll(){
  const val = parseInt(document.getElementById('width-input').value);
  if(isNaN(val) || val < 100 || val > 500){ alert('宽度范围为 100-500 px'); return; }
  saveSnapshot();
  globalNodeWidth = val;
  function clearNodeWidths(node){
    node.nodeWidth = null;
    for(const c of node.children) clearNodeWidths(c);
  }
  clearNodeWidths(mindmap.root);
  mindmap.globalNodeWidth = globalNodeWidth;
  fullRender();
}

function applyWidthToSelected(){

/* ==================== CLOUD STORAGE (GitHub API) ==================== */
let _cloudTab = 'local';

async function githubApiFetch(endpoint, method, body){
  const url = GITHUB_API + endpoint;
  const token = getGithubToken();
  if(!token){ throw new Error('请先设置GitHub令牌 (点🔑 令牌按钮)'); }
  const headers = {
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github.v3+json'
  };
  if(body){ headers['Content-Type'] = 'application/json'; }
  const res = await fetch(url, {method, headers, body: body ? JSON.stringify(body) : undefined});
  if(res.status === 404) return null;
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || 'HTTP ' + res.status);
  }
  return res.json();
}

function setupGithubToken(){
  const current = getGithubToken();
  const mask = current ? current.substring(0, 8) + '...' : '';
  const hint = current ? `当前令牌: ${mask}\n\n输入新令牌覆盖，或留空清除` : '请输入你的GitHub Personal Access Token';
  const token = prompt(hint, current);
  if(token === null) return;
  if(token.trim()){
    setGithubToken(token.trim());
    alert('✓ 令牌已保存到浏览器');
  } else {
    setGithubToken('');
    alert('令牌已清除');
  }
}

function showCloudSaveDialog(){
  document.getElementById('ld-save-title').textContent = '保存到云端 (GitHub)';
  document.getElementById('ld-save-name').value = document.getElementById('title-input').value.trim()||'实验脑图';
  document.getElementById('local-dialog-save').style.display = 'flex';

  document.getElementById('ld-save-confirm').onclick = saveToCloud;
  setTimeout(() => document.getElementById('ld-save-name').select(), 50);
}

async function saveToCloud(){
  const name = document.getElementById('ld-save-name').value.trim();
  if(!name){alert('请输入脑图名称');return}
  if(!mindmap){alert('没有可保存的数据');return}
  
  mindmap.updatedAt = nowISO();
  mindmap.title = document.getElementById('title-input').value.trim()||'实验脑图';
  mindmap.globalNodeWidth = globalNodeWidth;
  // Gzip compress then base64
  const jsonBytes = new TextEncoder().encode(JSON.stringify(mindmap, null, 2));
  const cs = new CompressionStream('gzip');
  const writer = cs.writable.getWriter();
  writer.write(jsonBytes);
  writer.close();
  const compressed = new Uint8Array(await new Response(cs.readable).arrayBuffer());
  const content = btoa(String.fromCharCode(...compressed));
  const path = CLOUD_DIR + '/' + name.replace(/[/\\:?*"<>|]/g,'_') + '.qmind';
  
  try {
    const doSave = async (retry) => {
      const exist = await githubApiFetch('/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/contents/'+path);
      const putBody = {message: '保存脑图: ' + name, content: content};
      if(exist) putBody.sha = exist.sha;
      try {
        await githubApiFetch('/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/contents/'+path, 'PUT', putBody);
      } catch(e2){
        if(retry && (e2.message||'').includes('does not match')) return doSave(false);
        throw e2;
      }
    };
    await doSave(true);
    hideLocalDialogs();
    alert('已保存到云端 ✓\nhttps://github.com/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/tree/main/'+path);
  } catch(e){
    alert('保存到云端失败：' + e.message);
  }
}

async function loadFromCloud(path, sha){
  const container = document.getElementById('ld-load-list');
  container.innerHTML = '<div class="ld-status">正在加载脑图...</div>';
  try {
    const data = await githubApiFetch('/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/contents/'+path);
    if(!data){alert('未找到该文件');return}
    // Large files (>1MB) return empty content, fallback to Git Blob API
    let rawContent = data.content;
    if(!rawContent || data.encoding === 'none'){
      const blob = await githubApiFetch('/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/git/blobs/'+data.sha);
      if(!blob || !blob.content){alert('无法读取文件内容');return}
      rawContent = blob.content;
    }
    // Try gzip decompress (new format), fallback to plain JSON (old format)
    let jsonStr;
    const rawBytes = Uint8Array.from(atob(rawContent), c => c.charCodeAt(0));
    if(rawBytes[0] === 0x1F && rawBytes[1] === 0x8B){
      const ds = new DecompressionStream('gzip');
      const dw = ds.writable.getWriter();
      dw.write(rawBytes);
      dw.close();
      jsonStr = new TextDecoder().decode(await new Response(ds.readable).arrayBuffer());
    } else {
      jsonStr = decodeURIComponent(escape(atob(rawContent)));
    }
    const d = JSON.parse(jsonStr);
    if(!d.version||!d.root||!d.root.id){alert('数据损坏');return}
    mindmap = d;
    if(d.globalNodeWidth !== undefined){
      globalNodeWidth = d.globalNodeWidth;
      document.getElementById('width-input').value = globalNodeWidth;
    }
    if(!mindmap.crossLinks) mindmap.crossLinks = [];
    if(!mindmap.summaries) mindmap.summaries = [];
    selectedId = null; multiSelected.clear();
    if(d.theme && themes[d.theme]) currentThemeName = d.theme;
    if(mindmap.root && mindmap.root.fontSize === null) mindmap.root.fontSize = 22;
    if(mindmap.root && mindmap.root.textAlign === null) mindmap.root.textAlign = 'center';
    fullRender();
    markClean();
    hideLocalDialogs();
  } catch(e){
    alert('加载云端文件失败：' + e.message);
  }
}

function renderExportCanvas(){
  if(!mindmap){alert('无数据可导出');return null;}

  const d1c = {};
  const exportTheme = themes[mindmap.theme] || themes.default;
  function gnc(node, depth, parentColor){
    if(node.fillColor || node.textColor){
      let dflt;
      if(depth===0) dflt = exportTheme.root;
      else if(depth===1){
        if(!d1c[node.id]){ d1c[node.id]=exportTheme.palette[0]; }
        dflt = d1c[node.id];
      } else {
        const idx = Math.min(depth - 1, exportTheme.palette.length - 1);
        dflt = exportTheme.palette[idx];
      }
      return {
        bg: node.fillColor || dflt.bg,
        border: node.fillColor ? darkenBorder(node.fillColor) : dflt.border,
        text: node.textColor || dflt.text
      };
    }
    if(depth===0) return exportTheme.root;
    if(depth===1){
      if(!d1c[node.id]){ d1c[node.id]=exportTheme.palette[0]; }
      return d1c[node.id];
    }
    const idx = Math.min(depth - 1, exportTheme.palette.length - 1);
    return exportTheme.palette[idx];
  }

  function calcTH(node){
    const nw = (node.nodeWidth !== undefined && node.nodeWidth !== null) ? node.nodeWidth : globalNodeWidth;
    const badgeW = countAtt(node) > 0 ? 35 : 0;
    const nh = calcTextHeight(node.label, Math.max(100, nw - badgeW), node.fontSize);
    const snH = (node.sideNotes && node.sideNotes.length > 0) ? node.sideNotes.length * 30 + 8 : 0;
    if(!node.expanded||node.children.length===0){
      node._nodeHeight = nh;
      node._treeHeight = nh + snH;
      return node._treeHeight;
    }
    node._nodeHeight = nh;
    let t=0; for(const c of node.children){c._treeHeight=calcTH(c); t+=c._treeHeight+V_GAP;} t-=V_GAP;
    node._treeHeight = Math.max(nh, t) + snH;
    return node._treeHeight;
  }

  const pos=[];
  function ap(node, depth, x, y, pc){
    const col=gnc(node,depth,pc);
    const nw = (node.nodeWidth !== undefined && node.nodeWidth !== null) ? node.nodeWidth : globalNodeWidth;
    const nh = node._nodeHeight || calcTextHeight(node.label, nw, node.fontSize);
    pos.push({node,x,y,w:nw,h:nh,depth,color:col});
    if(node.expanded&&node.children.length>0){
      const cx=x+nw+H_GAP;
      let total=0;
      for(const c of node.children) total+=c._treeHeight;
      total+=(node.children.length-1)*V_GAP;
      const pc2=y+nh/2;
      let cy=pc2-total/2;
      for(const c of node.children){ap(c,depth+1,cx,cy,col); cy+=c._treeHeight+V_GAP;}
    }
  }

  mindmap.root._treeHeight = calcTH(mindmap.root);
  const th = mindmap.root._treeHeight;
  const rootY2 = Math.max(40, (th - (mindmap.root._nodeHeight || calcTextHeight(mindmap.root.label, globalNodeWidth, mindmap.root.fontSize))) / 2);
  ap(mindmap.root, 0, ROOT_X, rootY2, null);

  let mx=0, my=0, mny=Infinity;
  for(const p of pos){mx=Math.max(mx,p.x+p.w); my=Math.max(my,p.y+p.h); mny=Math.min(mny,p.y);}
  const yOff = mny < 20 ? (20 - mny) : 0;
  if(yOff > 0){ for(const p of pos) p.y += yOff; my=0; for(const p of pos) my=Math.max(my,p.y+p.h); }
  const cw=mx+80, ch=my+80;

  const scale = 3;
  const canvas = document.createElement('canvas');
  canvas.width=cw*scale; canvas.height=ch*scale;
  canvas._logicalW = cw;
  canvas._logicalH = ch;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  ctx.fillStyle='#f7f8fa'; ctx.fillRect(0,0,cw,ch);

  ctx.fillStyle='#303133';
  ctx.font='bold 16px sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(mindmap.title||'实验脑图', 16, 10);

  const isRoundedExport = (mindmap.theme || 'default') === 'rounded';
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5;
  for(const p of pos){
    const {node,x,y,w,h,color}=p;
    if(!node.expanded||node.children.length===0) continue;
    for(const child of node.children){
      const cp=pos.find(pp=>pp.node.id===child.id);
      if(!cp) continue;
      const startY2 = y + h / 2;
      const sx=x+w, ex=cp.x, ey=cp.y+cp.h/2;
      ctx.beginPath();
      if(isRoundedExport && node.children.length > 1){
        ctx.strokeStyle = '#8fa84f';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        const c1x = sx + (ex - sx) * 0.7;
        const c1y = startY2;
        const c2x = ex - (ex - sx) * 0.3;
        const c2y = ey;
        ctx.moveTo(sx,startY2);
        ctx.bezierCurveTo(c1x,c1y,c2x,c2y,ex,ey);
      } else if(node.children.length === 1){
        ctx.strokeStyle = isRoundedExport ? '#8fa84f' : '#bbb';
        ctx.lineWidth = isRoundedExport ? 4 : 1.5;
        ctx.lineCap = isRoundedExport ? 'round' : 'butt';
        ctx.moveTo(sx,startY2); ctx.lineTo(ex,ey);
      } else {
        ctx.strokeStyle = '#bbb';
        ctx.lineWidth = 1.5;
        const mx2=sx+20;
        ctx.moveTo(sx,startY2); ctx.lineTo(mx2,startY2);
        ctx.lineTo(mx2,ey); ctx.lineTo(ex,ey);
      }
      ctx.stroke();
    }
  }

  // Export cross-links
  if(mindmap.crossLinks && mindmap.crossLinks.length > 0){
    ctx.setLineDash([6, 4]);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    for(const cl of mindmap.crossLinks){
      const fp = pos.find(pp => pp.node.id === cl.from);
      const tp = pos.find(pp => pp.node.id === cl.to);
      if(!fp || !tp) continue;
      const pathInfo = computeCrossLinkPath(cl, fp, tp, pos);
      ctx.strokeStyle = cl.color || '#e9891e';
      ctx.beginPath();
      ctx.moveTo(pathInfo.fx, pathInfo.fy);
      ctx.bezierCurveTo(pathInfo.c1x, pathInfo.c1y, pathInfo.c2x, pathInfo.c2y, pathInfo.tx, pathInfo.ty);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // Export summaries
  if(mindmap.summaries && mindmap.summaries.length > 0){
    for(const sum of mindmap.summaries){
      const sumPositions = [];
      for(const nid of sum.nodeIds){
        const np = pos.find(pp => pp.node.id === nid);
        if(np) sumPositions.push(np);
      }
      if(sumPositions.length === 0) continue;
      let minY = Infinity, maxY = -Infinity, maxX = -Infinity;
      for(const np of sumPositions){
        minY = Math.min(minY, np.y);
        maxY = Math.max(maxY, np.y + np.h);
        maxX = Math.max(maxX, np.x + np.w);
      }
      const bx = maxX + 18;
      const by1 = minY + 6;
      const by2 = maxY - 6;
      const byMid = (by1 + by2) / 2;
      const tipX = bx + 28;
      ctx.strokeStyle = '#409eff';
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(bx, by1);
      ctx.bezierCurveTo(bx+16, by1, bx+22, by1+6, bx+18, by1+12);
      ctx.lineTo(bx+18, byMid-10);
      ctx.bezierCurveTo(bx+18, byMid-4, tipX, byMid-4, tipX, byMid);
      ctx.bezierCurveTo(tipX, byMid+4, bx+18, byMid+4, bx+18, byMid+10);
      ctx.lineTo(bx+18, by2-12);
      ctx.bezierCurveTo(bx+22, by2-6, bx+16, by2, bx, by2);
      ctx.stroke();
      // Summary node label
      const sumNodeX = tipX + 6;
      const sumNodeY = byMid - 14;
      ctx.fillStyle = '#409eff';
      ctx.beginPath();
      const sr = 16;
      ctx.moveTo(sumNodeX+sr, sumNodeY);
      ctx.lineTo(sumNodeX+100, sumNodeY);
      ctx.quadraticCurveTo(sumNodeX+100+sr, sumNodeY, sumNodeX+100+sr, sumNodeY+sr);
      ctx.lineTo(sumNodeX+100+sr, sumNodeY+28);
      ctx.quadraticCurveTo(sumNodeX+100+sr, sumNodeY+28+sr, sumNodeX+100, sumNodeY+28+sr);
      ctx.lineTo(sumNodeX+sr, sumNodeY+28+sr);
      ctx.quadraticCurveTo(sumNodeX, sumNodeY+28+sr, sumNodeX, sumNodeY+28);
      ctx.lineTo(sumNodeX, sumNodeY+sr);
      ctx.quadraticCurveTo(sumNodeX, sumNodeY, sumNodeX+sr, sumNodeY);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(sum.label || '概要', sumNodeX + 10, sumNodeY + 14);
    }
  }

  for(const p of pos){
    const {x,y,w,h,color,node}=p;
    const isSel = selectedId===node.id;

    const isRoundedNode = (mindmap.theme || 'default') === 'rounded';
    const r = isRoundedNode ? Math.min(h/2, 999) : 8;
    ctx.beginPath();
    if(isRoundedNode && h > 0){
      const rx = Math.min(w/2, r);
      const ry = r;
      ctx.moveTo(x+rx,y);
      ctx.lineTo(x+w-rx,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+ry);
      ctx.lineTo(x+w,y+h-ry);
      ctx.quadraticCurveTo(x+w,y+h,x+w-rx,y+h);
      ctx.lineTo(x+rx,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-ry);
      ctx.lineTo(x,y+ry);
      ctx.quadraticCurveTo(x,y,x+rx,y);
    } else {
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r);
      ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r);
      ctx.quadraticCurveTo(x,y,x+r,y);
    }
    ctx.closePath();

    ctx.fillStyle = color.bg;
    ctx.fill();
    ctx.strokeStyle = isSel ? '#409eff' : color.border;
    ctx.lineWidth = isSel ? 2.5 : 1.5;
    ctx.stroke();

    const talign = node.textAlign || 'left';
    ctx.textAlign = talign; ctx.textBaseline='middle';
    ctx.font = (node.fontSize || 15) + 'px sans-serif';
    ctx.fillStyle = color.text;
    let label = node.label;
    const hasBadge = countAtt(node) > 0;
    const maxW = w - 24 - (hasBadge ? 35 : 0);
    let tx = x+12;
    if(talign === 'center') tx = x + 12 + maxW/2;
    else if(talign === 'right') tx = x + w - 12;
    if(ctx.measureText(label).width > maxW){
      const _fz = node.fontSize || 15;
      const charsPerLine = Math.floor(maxW / _fz);
      const lines = [];
      for(let i=0; i<label.length; i+=charsPerLine){
        lines.push(label.slice(i, i+charsPerLine));
      }
      const lineH = Math.round(_fz * 1.35);
      const totalH = lines.length * lineH;
      const startY = y + (h - totalH) / 2;
      ctx.textBaseline='top';
      for(let li=0; li<lines.length; li++){
        ctx.fillText(lines[li], tx, startY + li * lineH);
      }
    } else {
      ctx.fillText(label, tx, y+h/2);
    }

    const ac = countAtt(node);
    if(ac>0){
      ctx.font='11px sans-serif';
      ctx.textAlign='right'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(0,0,0,.4)';
      ctx.fillText('📎'+ac, x+w-8, y+h/2);
    }

    if(node.children.length>0){
      const cnt = countDesc(node);
      ctx.font= node.expanded ? '14px sans-serif' : '11px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(0,0,0,.4)';
      const cx = x + w + 8;
      const cy = y + h / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, 10, 0, Math.PI*2);
      ctx.fillStyle='#e0e0e0';
      ctx.fill();
      ctx.strokeStyle='#bbb';
      ctx.lineWidth=1;
      ctx.stroke();
      ctx.fillStyle='#555';
      ctx.fillText(node.expanded ? '−' : (cnt > 99 ? '99+' : cnt), cx, cy+1);
    }

    if(node.sideNotes && node.sideNotes.length > 0){
      const snW = Math.max(w, 160);
      let snY = y + h + 4;
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = '#d4b84c';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x + w/2, y + h);
      ctx.lineTo(x + w/2, snY);
      ctx.stroke();
      ctx.setLineDash([]);
      for(const sn of node.sideNotes){
        const snH = 24;
        ctx.fillStyle = '#fff8e1';
        ctx.strokeStyle = '#d4b84c';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 2]);
        ctx.beginPath();
        const r2 = 4;
        ctx.moveTo(x + r2, snY); ctx.lineTo(x + snW - r2, snY);
        ctx.quadraticCurveTo(x + snW, snY, x + snW, snY + r2);
        ctx.lineTo(x + snW, snY + snH - r2);
        ctx.quadraticCurveTo(x + snW, snY + snH, x + snW - r2, snY + snH);
        ctx.lineTo(x + r2, snY + snH);
        ctx.quadraticCurveTo(x, snY + snH, x, snY + snH - r2);
        ctx.lineTo(x, snY + r2);
        ctx.quadraticCurveTo(x, snY, x + r2, snY);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#5d4037';
        ctx.font = '13px sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        const snText = sn.text || '旁注...';
        const snMaxW = snW - 14;
        if(ctx.measureText(snText).width > snMaxW){
          const cpLine = Math.floor(snMaxW / 13);
          const lines = [];
          for(let i = 0; i < snText.length; i += cpLine) lines.push(snText.slice(i, i + cpLine));
          const lH = 16;
          const tStartY = snY + (snH - lines.length * lH) / 2;
          for(let li = 0; li < lines.length; li++) ctx.fillText(lines[li], x + 7, tStartY + li * lH);
        } else {
          ctx.fillText(snText, x + 7, snY + snH / 2);
        }
        snY += 30;
      }
    }
  }

  return canvas;
}

function downloadDataURL(dataUrl, ext){
  const a=document.createElement('a');
  a.href=dataUrl;
  a.download=(mindmap.title||'实验脑图').replace(/[\\/:*?"<>|]/g,'_')+'.'+ext;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function exportPNG(canvas){
  const dataUrl = canvas.toDataURL('image/png');
  downloadDataURL(dataUrl, 'png');
}

function exportJPEG(canvas){
  const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
  downloadDataURL(dataUrl, 'jpg');
}

function exportPDF(canvas){
  const logicalW = canvas._logicalW || canvas.width;
  const logicalH = canvas._logicalH || canvas.height;
  const pixelW = canvas.width;
  const pixelH = canvas.height;

  const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.92);
  const b64 = jpegDataUrl.split(',')[1];
  const binStr = atob(b64);
  const jpegBytes = new Uint8Array(binStr.length);
  for(let i=0; i<binStr.length; i++) jpegBytes[i] = binStr.charCodeAt(i);

  const parts = [];

  function push(s){
    for(let i=0; i<s.length; i++) parts.push(s.charCodeAt(i));
  }

  function pushObj(num, content){
    const s = `${num} 0 obj\n${content}\nendobj\n`;
    for(let i=0; i<s.length; i++) parts.push(s.charCodeAt(i));
  }

  push('%PDF-1.4\n');

  const off1 = parts.length;
  pushObj(1, '<< /Type /Catalog /Pages 2 0 R >>');

  const off2 = parts.length;
  pushObj(2, '<< /Type /Pages /Kids [3 0 R] /Count 1 >>');

  const off3 = parts.length;
  const contentStream = `q\n${logicalW} 0 0 ${logicalH} 0 0 cm\n/Im0 Do\nQ`;
  const pageDict = `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${logicalW} ${logicalH}] /Contents 4 0 R /Resources << /XObject << /Im0 5 0 R >> >> >>`;
  pushObj(3, pageDict);

  const off4 = parts.length;
  pushObj(4, `<< /Length ${contentStream.length} >>\nstream\n${contentStream}\nendstream`);

  const off5 = parts.length;
  push(`${5} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${pixelW} /Height ${pixelH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`);
  for(let i=0; i<jpegBytes.length; i++) parts.push(jpegBytes[i]);
  push('\nendstream\nendobj\n');

  const xrefOff = parts.length;

  const offsets = [0, off1, off2, off3, off4, off5];
  push('xref\n0 6\n');
  push('0000000000 65535 f \n');
  for(const off of offsets){
    push(String(off).padStart(10,'0') + ' 00000 n \n');
  }
  push(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefOff}\n%%EOF`);

  const pdfBytes = new Uint8Array(parts);
  const pdfBlob = new Blob([pdfBytes], {type:'application/pdf'});
  const pdfUrl = URL.createObjectURL(pdfBlob);
  downloadDataURL(pdfUrl, 'pdf');
  setTimeout(() => URL.revokeObjectURL(pdfUrl), 1000);
}

/* ==================== COLOR PICKER ==================== */
let colorPickerNodeId = null;
let colorTarget = 'fill';
let tempFillColor = null;
let tempTextColor = null;

const COLOR_PALETTE = [
  '#ffffff','#f5f5f5','#e0e0e0','#bdbdbd','#9e9e9e','#757575','#424242','#000000',
  '#f44336','#e91e63','#ff6b6b','#ff9800','#ffc107','#ffeb3b','#4caf50','#66bb6a',
  '#00bcd4','#26c6da','#2196f3','#42a5f5','#3f51b5','#5c6bc0','#9c27b0','#ab47bc',
  '#795548','#8d6e63','#a1887f','#607d8b','#78909c','#90a4ae','#b0bec5','#cfd8dc'
];

function buildColorPalette(){
  const grid = document.getElementById('color-palette-grid');
  if(!grid) return;
  grid.innerHTML = COLOR_PALETTE.map(c =>
    `<div class="palette-swatch" data-color="${c}" style="width:100%;aspect-ratio:1;border-radius:4px;background:${c};border:1.5px solid ${c==='#ffffff'?'#ddd':c};cursor:pointer;transition:transform .1s" title="${c}"></div>`
  ).join('');
  grid.querySelectorAll('.palette-swatch').forEach(el => {
    el.addEventListener('click', () => {
      const color = el.dataset.color;
      if(colorTarget === 'fill'){
        tempFillColor = color;
        document.getElementById('color-fill-preview').style.background = color;
      } else {
        tempTextColor = color;
        document.getElementById('color-text-preview').style.background = color;
      }
      grid.querySelectorAll('.palette-swatch').forEach(s => s.style.outline = 'none');
      el.style.outline = '2px solid ' + (color==='#ffffff'||color==='#f5f5f5'||color==='#e0e0e0'?'#555':'#fff');
      el.style.outlineOffset = '1px';
    });
    el.addEventListener('mouseenter', () => { el.style.transform = 'scale(1.15)' });
    el.addEventListener('mouseleave', () => { el.style.transform = 'scale(1)' });
  });
}

function setColorTarget(target){
  colorTarget = target;
  const fillBtn = document.getElementById('color-target-fill');
  const textBtn = document.getElementById('color-target-text');
  if(target === 'fill'){
    fillBtn.style.borderColor = 'var(--accent)'; fillBtn.style.background = 'var(--accent-light)'; fillBtn.style.color = 'var(--accent)'; fillBtn.style.fontWeight = '600';
    textBtn.style.borderColor = 'var(--border)'; textBtn.style.background = 'var(--panel-bg)'; textBtn.style.color = 'var(--text)'; textBtn.style.fontWeight = '400';
  } else {
    textBtn.style.borderColor = 'var(--accent)'; textBtn.style.background = 'var(--accent-light)'; textBtn.style.color = 'var(--accent)'; textBtn.style.fontWeight = '600';
    fillBtn.style.borderColor = 'var(--border)'; fillBtn.style.background = 'var(--panel-bg)'; fillBtn.style.color = 'var(--text)'; fillBtn.style.fontWeight = '400';
  }
}

function openColorPicker(id){
  colorPickerNodeId = id;
  const n = findNode(id, mindmap.root);
  if(!n) return;

  const depth = findDepth(id);
  const pc = id === mindmap.root.id ? null : computeParentColor(mindmap.root, n, null, 0);
  const def = getDefaultColor(n, depth, pc);

  tempFillColor = n.fillColor || def.bg;
  tempTextColor = n.textColor || def.text;

  document.getElementById('color-fill-preview').style.background = tempFillColor;
  document.getElementById('color-text-preview').style.background = tempTextColor;

  let grid = document.getElementById('color-palette-grid');
  if(!grid.children.length) buildColorPalette();
  grid.querySelectorAll('.palette-swatch').forEach(s => s.style.outline = 'none');

  colorTarget = 'fill';
  setColorTarget('fill');
  document.getElementById('color-modal').classList.add('show');
}

function applyColor(){
  if(!colorPickerNodeId || !mindmap) return;
  const n = findNode(colorPickerNodeId, mindmap.root);
  if(!n) return;
  saveSnapshot();
  n.fillColor = tempFillColor || null;
  n.textColor = tempTextColor || null;
  mindmap.updatedAt = nowISO();
  document.getElementById('color-modal').classList.remove('show');
  colorPickerNodeId = null;
  fullRender();
  if(selectedId){
    const el = document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);
    if(el) el.classList.add('selected');
  }
}

function clearColor(){
  if(!colorPickerNodeId || !mindmap) return;
  const n = findNode(colorPickerNodeId, mindmap.root);
  if(!n) return;
  saveSnapshot();
  n.fillColor = null;
  n.textColor = null;
  mindmap.updatedAt = nowISO();
  document.getElementById('color-modal').classList.remove('show');
  colorPickerNodeId = null;
  fullRender();
  if(selectedId){
    const el = document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);
    if(el) el.classList.add('selected');
  }
}

function renderThemeGrid(){
  const grid = document.getElementById('theme-grid');
  let html = '';
  for(const [key, theme] of Object.entries(themes)){
    const isActive = key === currentThemeName;
    let swatches = '';
    const allColors = [theme.root.bg, ...theme.palette.map(p => p.bg)];
    for(const c of allColors.slice(0,8)){
      swatches += `<div style="width:24px;height:24px;border-radius:4px;background:${c}"></div>`;
    }
    html += `<div class="theme-card" data-theme="${key}" style="border:2px solid ${isActive?'#409eff':'var(--border)'};border-radius:8px;padding:12px;cursor:pointer;background:#fff${isActive?'':''}">
      <div style="font-size:14px;font-weight:500;margin-bottom:8px">${theme.name}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">${swatches}</div>
    </div>`;
  }
  grid.innerHTML = html;
}

  /* Summary inline edit helpers */
  function commitSummaryEdit(sumid, sumNode){
    if(!sumNode) return;
    const v = sumNode.textContent.trim();
    const sum = mindmap.summaries.find(s => s.id === sumid);
    if(sum){
      if(v && v !== sum.label){
        saveSnapshot();
        sum.label = v;
        markDirty();
      }
      mindmap.updatedAt = nowISO();
    }
    // Clean up editing state
    sumNode.contentEditable = 'false';
    sumNode.classList.remove('editing');
    sumNode.onkeydown = null;
    sumNode.onblur = null;
    editingSummaryId = null;
    fullRender();
    if(selectedId){
      const el2 = document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);
      if(el2) el2.classList.add('selected');
    }
  }
  function revertSummaryEdit(sumid, sumNode, originalLabel){
    if(!sumNode) return;
    sumNode.textContent = originalLabel;
    sumNode.contentEditable = 'false';
    sumNode.classList.remove('editing');
    sumNode.onkeydown = null;
    sumNode.onblur = null;
    editingSummaryId = null;
    fullRender();
    if(selectedId){
      const el2 = document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);
      if(el2) el2.classList.add('selected');
    }
  }
function addNodeToSummary(sumid, mode){
  const sum = mindmap.summaries.find(s => s.id === sumid);
  if(!sum) return;
  if(!sum.children) sum.children = [];

  if(mode === 'child'){
    saveSnapshot();
    const n = createNode('');
    sum.children.push(n);
    selectedId = n.id;
    selectedSummaryId = null;
    mindmap.updatedAt = nowISO();
    markDirty();
    fullRender();
    scrollToNode(n.id);
    startEditing(n.id);
  } else if(mode === 'sibling'){
    let idx = -1;
    if(selectedId){
      idx = sum.children.findIndex(c => c.id === selectedId);
    }
    saveSnapshot();
    const n = createNode('');
    if(idx !== -1){
      sum.children.splice(idx + 1, 0, n);
    } else {
      sum.children.push(n);
    }
    selectedId = n.id;
    selectedSummaryId = null;
    mindmap.updatedAt = nowISO();
    markDirty();
    fullRender();
    scrollToNode(n.id);
    startEditing(n.id);
  }
}

        sel.addRange(range);
        // Handle keyboard: Enter=commit, Escape=revert
        sumNode.onkeydown = function(ke){
          if(ke.isComposing) return;
          if(ke.key === 'Enter'){
            ke.preventDefault();
            ke.stopPropagation();
            commitSummaryEdit(sumid, sumNode);
            return false;
          }
          if(ke.key === 'Escape'){
            ke.preventDefault();
            ke.stopPropagation();
            revertSummaryEdit(sumid, sumNode, sum.label || '概要');
            return false;
          }
        };
        // Handle blur: auto-commit
        sumNode.onblur = function(){

    for(const item of items){
      if(item.type.startsWith('image/')){
        e.preventDefault();
        const blob = item.getAsFile();
        const reader = new FileReader();
        reader.onload = () => {
          const img = document.createElement('img');
          img.src = reader.result;
          ed.appendChild(img);
          const space = document.createTextNode('\u00A0');
          ed.appendChild(space);
          const sel = window.getSelection();
          sel.removeAllRanges();
          const range = document.createRange();
          range.setStartAfter(space);
          range.collapse(true);
          sel.addRange(range);
        };
        reader.readAsDataURL(blob);
      }
    }
  });

  function adjustSelFontSize(delta){
    var noteEditor = document.getElementById('inline-editor-text');

    if(sel && sel.rangeCount > 0 && !sel.isCollapsed && noteEditor.contains(sel.getRangeAt(0).commonAncestorContainer)){
      range = sel.getRangeAt(0);
    } else if(_savedNoteRange) {

    // Try to find existing font-size on the closest parent/self
    var target = range.commonAncestorContainer;
    if(target.nodeType === 3) target = target.parentNode;
    var cs = target ? window.getComputedStyle(target) : null;
    var curFs = cs ? parseFloat(cs.fontSize) : 16;
    if(isNaN(curFs) || curFs < 8) curFs = 16;
    var newFs = Math.max(8, Math.min(72, Math.round(curFs + delta)));
    var txt = range.toString();
    if(!txt) return;
    var span = document.createElement('span');
    span.style.fontSize = newFs + 'px';
    span.textContent = txt;
    range.deleteContents();
    range.insertNode(span);
    if(sel) sel.removeAllRanges();
    var nr = document.createRange();

     - IME输入中(isComposing) → 不做特殊处理，让输入法正常运作 */
  inlineInput.onkeydown = function(e){

      const v2 = inlineInput.textContent.trim();
      const n2 = findNode(selectedId, mindmap.root);

      if(n2 && html !== n2.label){
        saveSnapshot();

      if(selectedId) addChild(selectedId);

         只阻止冒泡避免触发全局删除逻辑，不隐藏输入框，不恢复文本 */
      e.preventDefault();
      e.stopPropagation();
    }
  };
