    // Escape: cancel summary edit > exit link mode > deselect cross-link/summary
    if(e.key==='Escape'){
      if(editingSummaryId){
        e.preventDefault();
        const sumNode = document.querySelector(`.summary-node[data-sumid="${editingSummaryId}"]`);
        if(sumNode){
          const sum = mindmap.summaries.find(s => s.id === editingSummaryId);
          revertSummaryEdit(editingSummaryId, sumNode, sum ? (sum.label || '概要') : '概要');
        }
        return;
      }
      if(linkMode || linkSourceId || selectedCrossLinkId || selectedSummaryId){
        e.preventDefault();
        linkMode = false;
        linkSourceId = null;
        selectedCrossLinkId = null;
        selectedSummaryId = null;
        document.getElementById('btn-link').classList.remove('active');
        document.getElementById('btn-link').textContent = '🔗 连线';
        fullRender();
        if(selectedId){
          const el2 = document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);
          if(el2) el2.classList.add('selected');
        }
        return;
      }
    }

    // Ctrl+N / Cmd+N: new
    // Ctrl+N / Cmd+N: new
    if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();if(mindmap&&!confirm('新建将清空当前脑图？'))return;newMindmap('实验脑图');return}
    // Ctrl+Z / Cmd+Z: undo
    if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undo();return}
    // Ctrl+Shift+Z / Cmd+Shift+Z: redo
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='z'){e.preventDefault();redo();return}

    // F2 on selected node → start editing (MindMaster style)
    if(e.key==='F2' && selectedId){e.preventDefault();startEditing(selectedId);return}
    // Space on selected node → start editing at end of text
    if(e.key===' ' && selectedId && !e.ctrlKey && !e.metaKey && !e.altKey){
      const inInput = e.target.closest('input,textarea,[contenteditable]');
      if(!inInput){
        e.preventDefault();
        startEditing(selectedId);
        const inp = document.getElementById('inline-label-input');
        if(inp){ setTimeout(() => { inp.focus(); const r=document.createRange(); r.selectNodeContents(inp); r.collapse(false); const s=window.getSelection(); s.removeAllRanges(); s.addRange(r); }, 0); }
        return;
      }
    }

    // Skip if focus is in a text input/textarea (except our inline label input)
    const inInput = e.target.closest('input,textarea');
    if(inInput && inInput.id !== 'inline-label-input') return;

    // Skip if editing a contenteditable (side note editing)
    if(e.target.closest('[contenteditable="true"]')) return;

    /* 【优化】内联编辑中 → 不让全局处理 Delete/Backspace */
    const inlineInput2 = document.getElementById('inline-label-input');
    if((e.key==='Delete'||e.key==='Backspace') && inlineInput2.style.display!=='none') return;

    /* 【优化】键入即编辑：选中节点后直接显示编辑框
       让按键自然流向 textarea，不碰光标/selection，IME 全程畅通 */
    if(selectedId && !e.ctrlKey && !e.metaKey && !e.altKey && !e.isComposing && e.key.length === 1 && inlineInput2.style.display === 'none'){
      startEditing(selectedId);
      // 不调用 setSelectionRange——让按键自然落入 textarea，不打断 IME
      return;
    }

    // Tab: add child node (to selected node or selected summary)
    if(e.key==='Tab'){
      e.preventDefault();
      if(selectedSummaryId) addNodeToSummary(selectedSummaryId, 'child');
      else if(selectedId) addChild(selectedId);
      return;
    }
    // Enter: add sibling node (to selected node or selected summary)
    if(e.key==='Enter'){
      e.preventDefault();
      if(selectedSummaryId) addNodeToSummary(selectedSummaryId, 'sibling');
      else if(selectedId && selectedId !== mindmap.root.id) addSibling(selectedId);
      return;
    }
    // Delete/Backspace: delete selected summary
    if((e.key==='Delete'||e.key==='Backspace')&&selectedSummaryId){
      e.preventDefault();
      saveSnapshot();
      mindmap.summaries = mindmap.summaries.filter(s => s.id !== selectedSummaryId);
      selectedSummaryId = null;
      mindmap.updatedAt = nowISO();
      fullRender();
      if(selectedId){
        const el2 = document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);
        if(el2) el2.classList.add('selected');
      }
      return;
    }
    // Delete/Backspace: delete selected cross-link
    if((e.key==='Delete'||e.key==='Backspace')&&selectedCrossLinkId){
      e.preventDefault();
      saveSnapshot();
      mindmap.crossLinks = mindmap.crossLinks.filter(cl => cl.id !== selectedCrossLinkId);
      selectedCrossLinkId = null;
      mindmap.updatedAt = nowISO();
      fullRender();
      if(selectedId){
        const el2 = document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);
        if(el2) el2.classList.add('selected');
      }
      return;
    }
    // Delete/Backspace: delete selected node (only fires when NOT in inline edit mode)
    if((e.key==='Delete'||e.key==='Backspace')&&selectedId){e.preventDefault();deleteSelectedNodes();return}
  });

  // Drag and drop images/files onto mind map
  const area=document.getElementById('mindmap-area');
  area.addEventListener('dragover',e=>{e.preventDefault();if(selectedId){const el=document.querySelector(`#mindmap-tree .node[data-id="${selectedId}"]`);if(el)el.classList.add('drag-over')}});
  area.addEventListener('dragleave',()=>document.querySelectorAll('#mindmap-tree .node.drag-over').forEach(el=>el.classList.remove('drag-over')));
  area.addEventListener('drop',e=>{
    e.preventDefault();
    document.querySelectorAll('#mindmap-tree .node.drag-over').forEach(el=>el.classList.remove('drag-over'));
    if(!e.dataTransfer.files.length) return;
    const files=Array.from(e.dataTransfer.files);
    // Check for .qmind files first
    const qmindFiles=files.filter(f=>f.name.toLowerCase().endsWith('.qmind'));
    if(qmindFiles.length>0){
      if(mindmap&&!confirm('打开 .qmind 文件将替换当前脑图，是否继续？')) return;
      loadMindmap(qmindFiles[0]);
      return;
    }
    if(!selectedId) return;
    addImages(selectedId,files.filter(f=>f.type.startsWith('image/')));
    addFiles(selectedId,files.filter(f=>!f.type.startsWith('image/')));
  });

  // Drag and drop files onto attachment panel
  let panelDropCounter=0;
  const panelEl=document.getElementById('attach-panel');
  panelEl.addEventListener('dragenter',e=>{
    e.preventDefault();
    panelDropCounter++;
    if(!panelEl.classList.contains('collapsed')&&selectedId){
      panelEl.classList.add('drop-active');
    }
  });
  panelEl.addEventListener('dragover',e=>{
    e.preventDefault();
    if(!panelEl.classList.contains('collapsed')&&selectedId){
      e.dataTransfer.dropEffect='copy';
    }
  });
  panelEl.addEventListener('dragleave',()=>{
    panelDropCounter--;
    if(panelDropCounter<=0){
      panelDropCounter=0;
      panelEl.classList.remove('drop-active');
    }
  });
  panelEl.addEventListener('drop',e=>{
    e.preventDefault();
    panelDropCounter=0;
    panelEl.classList.remove('drop-active');
    if(!selectedId||!e.dataTransfer.files.length) return;
    const files=Array.from(e.dataTransfer.files);
    addImages(selectedId,files.filter(f=>f.type.startsWith('image/')));
    addFiles(selectedId,files.filter(f=>!f.type.startsWith('image/')));
  });

  // Paste images on attachment panel blank area -> add as attachments
  panelEl.addEventListener('paste', e => {
    // Skip if target is inside comment editor (handled by panel-list paste handler)
    if(e.target.closest('.cmt-editor')) return;
    if(e.target.closest('#inline-editor-text')) return; // handled by inline editor paste handler
    if(!selectedId) return;
    const items = e.clipboardData && e.clipboardData.items;
    if(!items) return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        e.preventDefault();
        const blob = item.getAsFile();
        const reader = new FileReader();
        reader.onload = ev => {
          const n = findNode(selectedId, mindmap.root);
          if(!n) return;
          const ts = nowISO().slice(11,19).replace(/:/g,'');
          n.attachments.push(createAtt('image','paste_'+ts+'.png',ev.target.result,'image/png',blob.size));
          mindmap.updatedAt = nowISO();
          markDirty();
          fullRender();
        };
        reader.readAsDataURL(blob);
      }
    }
  });

  function checkWidth(){
    const t=document.getElementById('panel-toggle');
    const p=document.getElementById('attach-panel');
    if(window.innerWidth>768){t.classList.remove('show');if(selectedId)p.classList.remove('collapsed')}
    else if(selectedId&&!p.classList.contains('collapsed'))t.classList.add('show');
  }
  window.addEventListener('resize',checkWidth);

  // Canvas panning - drag to translate
  let isPanning = false;
  let panStartX = 0, panStartY = 0;
  let panTranslateX = 0, panTranslateY = 0;
  let mouseDownX = 0, mouseDownY = 0;
  let isMarquee = false;
  let isRightPan = false;
  let rightPanDragged = false;
  let marqueeStartX = 0, marqueeStartY = 0;

  let nodeDragId = null;
  let isDraggingNode = false;
  let dragGhostEl = null;
  let dropIndicatorEl = null;
  let dragTargetInfo = null;

  function cleanupNodeDrag(){
    isDraggingNode = false; nodeDragId = null; dragTargetInfo = null;
    if(dragGhostEl){dragGhostEl.remove();dragGhostEl=null}
    if(dropIndicatorEl){dropIndicatorEl.remove();dropIndicatorEl=null}
    const orig=document.querySelector('.node.dragging');
    if(orig){orig.classList.remove('dragging');orig.style.opacity=''}
  }

  const treeContainer = document.getElementById('mindmap-tree');
  const mindmapArea = document.getElementById('mindmap-area');
  const marqueeEl = document.getElementById('marquee-overlay');

  mindmapArea.addEventListener('mousedown', function(e) {
    mouseDownX = e.clientX;
    mouseDownY = e.clientY;
    wasDragged = false;
    rightPanDragged = false;

    const nodeEl = e.target.closest('.node');
    if (nodeEl && e.button === 0) {
      if(e.target.closest('.fold-btn')||e.target.closest('.badge')) return;
      nodeDragId = nodeEl.dataset.id;
      isDraggingNode = false;
      return;
    }
    nodeDragId = null;

    if (e.target.closest('.attach-panel') || e.target.closest('.context-menu') || e.target.closest('.modal-overlay')) return;
    if (e.target.closest('.toolbar')) return;

    const _pi = document.getElementById('inline-label-input');
    if(_pi.style.display !== 'none'){ _pi.blur(); _pi.style.display = 'none'; }

    if (e.button === 0) {
      isMarquee = true;
      marqueeStartX = e.clientX;
      marqueeStartY = e.clientY;
      marqueeEl.style.display = 'block';
      marqueeEl.style.left = e.clientX + 'px';
      marqueeEl.style.top = e.clientY + 'px';
      marqueeEl.style.width = '0px';
      marqueeEl.style.height = '0px';
      mindmapArea.style.cursor = 'crosshair';
      e.preventDefault();
    } else if (e.button === 2) {
      isRightPan = true;
      panStartX = e.clientX - panTranslateX;
      panStartY = e.clientY - panTranslateY;
      mindmapArea.classList.add('panning');
      e.preventDefault();
    }
  });

  document.addEventListener('mousemove', function(e) {
    if(nodeDragId && !isDraggingNode &&
       (Math.abs(e.clientX - mouseDownX) > 10 || Math.abs(e.clientY - mouseDownY) > 10)){
      isDraggingNode = true;
      isMarquee = false;
      marqueeEl.style.display = 'none';
      const nodeEl = document.querySelector(`.node[data-id="${nodeDragId}"]`);
      if(nodeEl){
        nodeEl.classList.add('dragging');
        nodeEl.style.opacity = '0.3';
        dragGhostEl = nodeEl.cloneNode(true);
        dragGhostEl.style.cssText = 'position:fixed;opacity:0.75;pointer-events:none;z-index:10000;transform:scale(1.06);filter:drop-shadow(0 4px 12px rgba(0,0,0,.2));border-radius:8px';
        document.body.appendChild(dragGhostEl);
        dropIndicatorEl = document.createElement('div');
        dropIndicatorEl.style.cssText = 'position:fixed;height:3px;background:#409eff;z-index:9999;border-radius:3px;display:none;pointer-events:none;box-shadow:0 0 8px rgba(64,158,255,.6)';
        document.body.appendChild(dropIndicatorEl);
      }
    }
    if(isDraggingNode){
      if(dragGhostEl){
        const hw = (dragGhostEl.offsetWidth||120)/2;
        dragGhostEl.style.left = (e.clientX - hw) + 'px';
        dragGhostEl.style.top = (e.clientY - 25) + 'px';
      }
      let bestEl = null, bestPos = 'after', bestScore = Infinity;
      const allNodes = document.querySelectorAll('#mindmap-tree .node');
      for(const el of allNodes){
        if(el.dataset.id === nodeDragId || el.classList.contains('dragging')) continue;
        const r = el.getBoundingClientRect();
        if(e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom){
          bestEl = el; bestPos = 'child'; bestScore = 0; break;
        }
        const margin = 30;
        if(e.clientY >= r.top - margin && e.clientY <= r.bottom + margin){
          const cy = r.top + r.height/2;
          const dist = Math.abs(e.clientY - cy);
          if(dist < bestScore){
            bestScore = dist;
            bestEl = el;
            bestPos = e.clientY < cy ? 'before' : 'after';
          }
        }
      }
      if(bestEl && bestPos !== 'child' && dropIndicatorEl){
        const r = bestEl.getBoundingClientRect();
        const iy = bestPos === 'before' ? r.top - 1 : r.bottom + 1;
        const areaRect = document.getElementById('mindmap-area').getBoundingClientRect();
        dropIndicatorEl.style.left = Math.max(areaRect.left, r.left - 40) + 'px';
        dropIndicatorEl.style.width = Math.min(areaRect.right - Math.max(areaRect.left, r.left - 40), r.width + 80) + 'px';
        dropIndicatorEl.style.top = iy + 'px';
        dropIndicatorEl.style.display = '';
      } else if(dropIndicatorEl){
        dropIndicatorEl.style.display = 'none';
      }
      dragTargetInfo = bestEl ? {targetId:bestEl.dataset.id, position:bestPos} : null;
      return;
    }
    if(isMarquee){
      const left = Math.min(marqueeStartX, e.clientX);
      const top = Math.min(marqueeStartY, e.clientY);
      const w = Math.abs(e.clientX - marqueeStartX);
      const h = Math.abs(e.clientY - marqueeStartY);
      marqueeEl.style.left = left + 'px';
      marqueeEl.style.top = top + 'px';
      marqueeEl.style.width = w + 'px';
      marqueeEl.style.height = h + 'px';
      if(w > 5 || h > 5) wasDragged = true;
      return;
    }
    if(isRightPan){
      rightPanDragged = true;
      panTranslateX = e.clientX - panStartX;
      panTranslateY = e.clientY - panStartY;
      treeContainer.style.transform = `translate(${panTranslateX}px, ${panTranslateY}px)`;
      repositionIfEditing();
      return;
    }
  });

  document.addEventListener('mouseup', function(e) {
    if(isDraggingNode){
      if(dragTargetInfo && nodeDragId && dragTargetInfo.targetId !== nodeDragId){
        const dragN = findNode(nodeDragId, mindmap.root);
        const tgtN = findNode(dragTargetInfo.targetId, mindmap.root);
        if(dragN && tgtN){
          saveSnapshot();
          if(dragTargetInfo.position === 'child'){
            const _isDesc=(a,n)=>{if(a.id===n.id)return true;for(const c of a.children)if(_isDesc(c,n))return true;return false}
            if(!_isDesc(dragN, tgtN)){
              const oldP = findParent(nodeDragId, mindmap.root);
              if(oldP) oldP.children = oldP.children.filter(c=>c.id!==nodeDragId);
              tgtN.children.push(dragN);
              tgtN.expanded = true;
            }
          } else {
            const tgtP = findParent(dragTargetInfo.targetId, mindmap.root);
            if(tgtP){
              const oldP = findParent(nodeDragId, mindmap.root);
              if(oldP) oldP.children = oldP.children.filter(c=>c.id!==nodeDragId);
              const tgtIdx = tgtP.children.findIndex(c=>c.id===dragTargetInfo.targetId);
              const insIdx = dragTargetInfo.position === 'before' ? tgtIdx : tgtIdx + 1;
              tgtP.children.splice(insIdx, 0, dragN);
            }
          }
        }
      }
      cleanupNodeDrag();
      fullRender();
      if(selectedId){const el=document.querySelector(`.node[data-id="${selectedId}"]`);if(el)el.classList.add('selected')}
      return;
    }
    if(isMarquee){
      isMarquee = false;
      marqueeEl.style.display = 'none';
      mindmapArea.style.cursor = 'default';
      if(wasDragged){
        const rect = {
          left: Math.min(marqueeStartX, e.clientX),
          top: Math.min(marqueeStartY, e.clientY),
          right: Math.max(marqueeStartX, e.clientX),
          bottom: Math.max(marqueeStartY, e.clientY)
        };
        const selectedIds = [];
        document.querySelectorAll('#mindmap-tree .node').forEach(el => {
          const r = el.getBoundingClientRect();
          if(r.left < rect.right && r.right > rect.left && r.top < rect.bottom && r.bottom > rect.top){
            selectedIds.push(el.dataset.id);
          }
        });
        if(selectedIds.length > 0){
          selectedId = selectedIds[0];
          multiSelected.clear();
          selectedIds.forEach(id => multiSelected.add(id));
          document.querySelectorAll('#mindmap-tree .node.selected').forEach(el => el.classList.remove('selected'));
          for(const sid of multiSelected){
            const el = document.querySelector(`#mindmap-tree .node[data-id="${sid}"]`);
            if(el) el.classList.add('selected');
          }
          renderPanel();
        }
      }
      return;
    }
    if(isRightPan){
      isRightPan = false;
      mindmapArea.classList.remove('panning');
      if(rightPanDragged){
        setTimeout(() => rightPanDragged = false, 0);
      }
      return;
    }
    nodeDragId = null;
    if(!wasDragged && Math.abs(e.clientX - mouseDownX) < 10 && Math.abs(e.clientY - mouseDownY) < 10){
      const target = e.target;
      if(!target.closest('.node') && !target.closest('.summary-node') && !target.closest('.summary-brace') && 
         !target.closest('.toolbar') && !target.closest('.context-menu') && 
         !target.closest('.modal-overlay') && !target.closest('.attach-panel')){
        var needRender = false;
        if(selectedId){
          const _hid = document.getElementById('inline-label-input');
          if(_hid) _hid.style.display = 'none';
          selectedId = null;
          multiSelected.clear();
          needRender = true;
        }
        if(selectedSummaryId && !target.closest('.summary-node') && !target.closest('.summary-brace')){
          selectedSummaryId = null;
          needRender = true;
        }
        if(needRender) fullRender();
      }
    }
  });
}

function computeParentColor(root, target, parentColor, depth){
  if(root.id === target.id) return parentColor;
  const nodeColor = getNodeColor(root, depth, parentColor);
  for(const c of root.children){
    const r = computeParentColor(c, target, nodeColor, depth + 1);
    if(r !== undefined) return r;
  }
  return undefined;
}

function findDepth(id){
  function walk(node, d){
    if(node.id===id) return d;
    for(const c of node.children){const r=walk(c,d+1);if(r!==undefined)return r}
    return undefined;
  }
  return walk(mindmap.root,0)||0;
}

/* ==================== INIT ==================== */
window.addEventListener('beforeunload', function(e){
  if(isDirty){
    e.preventDefault();
    e.returnValue = '您有未保存的更改，确定要离开吗？';
    return e.returnValue;
  }
});

document.addEventListener('DOMContentLoaded',()=>{
  try {
    const restored = checkAutoRestore();
    if(!restored) newMindmap('实验脑图');
    setupEvents();
    startAutoSave();
  } catch(e){
    console.error('Init error:', e);
    var er = document.getElementById('init-error');
    if(er){ er.style.display='block'; er.textContent = '初始化失败: ' + e.message + '\\n按 F12 查看控制台'; }
  }
});
// Fallback: if mindmap still null after 2s, force init
setTimeout(function(){
  if(!mindmap){
    try { newMindmap('实验脑图'); setupEvents(); startAutoSave(); } catch(e){}
  }
}, 2000);
</script>
</body>
